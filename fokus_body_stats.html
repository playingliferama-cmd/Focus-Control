<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LS Control — Текущие параметры</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px;
        }

        .phone {
            width: 375px;
            height: 700px;
            background: #111117;
            border-radius: 52px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 8px #1c1c24, 0 0 0 12px #2c2c34;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen {
            flex: 1;
            padding: 14px 18px 12px 18px;
            display: flex;
            flex-direction: column;
            background: #111117;
            height: 100%;
            overflow: hidden;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 215, 0, 0.08);
            border-radius: 30px;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: translateX(-3px);
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #FFD966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stats-card {
            background: rgba(30, 30, 42, 0.5);
            border-radius: 24px;
            padding: 16px;
            border: 0.5px solid rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(8px);
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .stats-title {
            font-size: 16px;
            font-weight: 600;
            color: #FFD966;
            margin-bottom: 14px;
        }

        .stats-grid {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-item {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 18px;
            padding: 8px 6px;
            text-align: center;
        }

        .stat-label {
            font-size: 11px;
            color: #8e8e9e;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: #FFD966;
        }

        .stat-unit {
            font-size: 9px;
            color: #6e6e7e;
        }

        .bmi-badge {
            display: inline-block;
            background: rgba(255, 215, 0, 0.15);
            padding: 2px 6px;
            border-radius: 20px;
            font-size: 9px;
            margin-top: 3px;
        }

        .tracker-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.08);
        }

        .tracker-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tracker-icon {
            font-size: 20px;
            width: 32px;
        }

        .tracker-info {
            display: flex;
            flex-direction: column;
        }

        .tracker-name {
            font-size: 13px;
            color: #fff;
            font-weight: 500;
        }

        .tracker-value {
            font-size: 10px;
            color: #8e8e9e;
        }

        .tracker-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tracker-count {
            font-size: 15px;
            font-weight: 600;
            color: #FFD966;
        }

        .tracker-btn {
            background: rgba(255, 215, 0, 0.1);
            border: 0.5px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 11px;
            color: #FFD966;
            cursor: pointer;
            transition: 0.2s;
        }

        .tracker-btn:hover {
            background: rgba(255, 215, 0, 0.2);
        }

        .best-result {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.08), rgba(255, 215, 0, 0.02));
            border-radius: 16px;
            padding: 8px 12px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .best-label {
            font-size: 12px;
            color: #aaa;
        }

        .best-value {
            font-size: 15px;
            font-weight: 700;
            color: #FFD966;
        }

        .chart-container {
            margin-top: 12px;
            margin-bottom: 8px;
        }

        .chart-title {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 12px;
        }

        .chart-bars {
            display: flex;
            align-items: flex-end;
            gap: 6px;
            height: 65px;
        }

        .chart-bar-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .chart-bar {
            width: 100%;
            background: linear-gradient(180deg, #FFD966, #FFAA33);
            border-radius: 3px;
            transition: height 0.3s;
            min-height: 3px;
        }

        .chart-label {
            font-size: 8px;
            color: #6e6e7e;
        }

        .update-buttons {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .update-btn {
            flex: 1;
            background: rgba(255, 215, 0, 0.08);
            border: 0.5px solid rgba(255, 215, 0, 0.2);
            border-radius: 30px;
            padding: 7px;
            text-align: center;
            font-size: 11px;
            color: #FFD966;
            cursor: pointer;
            transition: 0.2s;
        }

        .update-btn:hover {
            background: rgba(255, 215, 0, 0.15);
        }

        .tab-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0 6px;
            background: rgba(18, 18, 24, 0.9);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(255,255,255,0.06);
            margin-top: 12px;
            border-radius: 32px;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            color: #6e6e7e;
            font-size: 9px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .tab-item.active {
            color: #ffd966;
            background: rgba(255, 217, 102, 0.1);
        }

        .tab-icon {
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="screen">
            <div class="section-header">
                <div class="back-btn" onclick="location.href='fokus_body.html'">←</div>
                <div class="section-title">Текущие параметры</div>
            </div>

            <div class="stats-card">
                <div class="stats-title">📊 Основные параметры</div>
                
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label">Вес</div>
                        <div class="stat-value" id="weightValue">75<span class="stat-unit"> кг</span></div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Рост</div>
                        <div class="stat-value" id="heightValue">180<span class="stat-unit"> см</span></div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">ИМТ</div>
                        <div class="stat-value" id="bmiValue">23.1</div>
                        <div class="bmi-badge" id="bmiStatus">Норма</div>
                    </div>
                </div>

                <div class="tracker-row">
                    <div class="tracker-left">
                        <span class="tracker-icon">💧</span>
                        <div class="tracker-info">
                            <span class="tracker-name">Вода</span>
                            <span class="tracker-value">Цель: 8 стаканов</span>
                        </div>
                    </div>
                    <div class="tracker-right">
                        <span class="tracker-count" id="waterCount">3</span>
                        <div class="tracker-btn" id="addWater">+</div>
                    </div>
                </div>

                <div class="tracker-row">
                    <div class="tracker-left">
                        <span class="tracker-icon">😴</span>
                        <div class="tracker-info">
                            <span class="tracker-name">Сон</span>
                            <span class="tracker-value">Вчера</span>
                        </div>
                    </div>
                    <div class="tracker-right">
                        <span class="tracker-count" id="sleepValue">7ч 20м</span>
                    </div>
                </div>

                <div class="tracker-row">
                    <div class="tracker-left">
                        <span class="tracker-icon">👣</span>
                        <div class="tracker-info">
                            <span class="tracker-name">Шаги</span>
                            <span class="tracker-value">Цель: 10 000</span>
                        </div>
                    </div>
                    <div class="tracker-right">
                        <span class="tracker-count" id="stepsValue">6 234</span>
                        <div class="tracker-btn" id="addSteps">+</div>
                    </div>
                </div>

                <div class="best-result">
                    <span class="best-label">🏆 Лучший вес</span>
                    <span class="best-value" id="bestWeight">73.2 кг</span>
                </div>

                <div class="chart-container">
                    <div class="chart-title">📈 Динамика веса (7 дней)</div>
                    <div class="chart-bars" id="weightChart"></div>
                </div>

                <div class="update-buttons">
                    <div class="update-btn" id="updateWeightBtn">🔄 Обновить вес</div>
                    <div class="update-btn" id="updateStepsBtn">👣 Обновить шаги</div>
                </div>
            </div>

            <div class="tab-bar">
                <div class="tab-item" onclick="location.href='fokus_progress.html'">
                    <span class="tab-icon">📈</span>
                    <span>Прогресс</span>
                </div>
                <div class="tab-item active">
                    <span class="tab-icon">💪</span>
                    <span>Тело</span>
                </div>
                <div class="tab-item" onclick="location.href='fokus_profile.html'">
                    <span class="tab-icon">👤</span>
                    <span>Профиль</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let statsData = {
            weight: 75,
            height: 180,
            water: 3,
            sleep: "7ч 20м",
            steps: 6234,
            bestWeight: 73.2,
            weightHistory: [77, 76.5, 76, 75.5, 75, 74.8, 75]
        };

        function calculateBMI() {
            const heightM = statsData.height / 100;
            return (statsData.weight / (heightM * heightM)).toFixed(1);
        }

        function getBMIStatus(bmi) {
            if (bmi < 18.5) return "Дефицит";
            if (bmi < 25) return "Норма";
            if (bmi < 30) return "Избыток";
            return "Ожирение";
        }

        function renderChart() {
            const container = document.getElementById('weightChart');
            container.innerHTML = '';
            const maxWeight = Math.max(...statsData.weightHistory);
            const minWeight = Math.min(...statsData.weightHistory);
            const range = maxWeight - minWeight || 1;
            
            statsData.weightHistory.forEach(weight => {
                const height = ((weight - minWeight) / range) * 50 + 10;
                const wrapper = document.createElement('div');
                wrapper.className = 'chart-bar-wrapper';
                wrapper.innerHTML = `
                    <div class="chart-bar" style="height: ${height}px;"></div>
                    <div class="chart-label">${weight}</div>
                `;
                container.appendChild(wrapper);
            });
        }

        function updateUI() {
            document.getElementById('weightValue').innerHTML = statsData.weight + '<span class="stat-unit"> кг</span>';
            document.getElementById('heightValue').innerHTML = statsData.height + '<span class="stat-unit"> см</span>';
            const bmi = calculateBMI();
            document.getElementById('bmiValue').innerHTML = bmi;
            document.getElementById('bmiStatus').innerHTML = getBMIStatus(bmi);
            document.getElementById('waterCount').innerHTML = statsData.water;
            document.getElementById('sleepValue').innerHTML = statsData.sleep;
            document.getElementById('stepsValue').innerHTML = statsData.steps.toLocaleString();
            document.getElementById('bestWeight').innerHTML = statsData.bestWeight + ' кг';
            renderChart();
            localStorage.setItem('ls_control_body_stats', JSON.stringify(statsData));
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem('ls_control_body_stats');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    statsData = { ...statsData, ...data };
                } catch(e) {}
            }
            updateUI();
        }

        document.getElementById('addWater').addEventListener('click', () => {
            if (statsData.water < 8) {
                statsData.water++;
                updateUI();
            } else {
                alert('Цель на сегодня достигнута! 🎉');
            }
        });

        document.getElementById('addSteps').addEventListener('click', () => {
            let newSteps = prompt('Сколько шагов вы прошли?', statsData.steps);
            if (newSteps && !isNaN(newSteps)) {
                statsData.steps = parseInt(newSteps);
                updateUI();
            }
        });

        document.getElementById('updateWeightBtn').addEventListener('click', () => {
            let newWeight = prompt('Введите новый вес (кг):', statsData.weight);
            if (newWeight && !isNaN(newWeight)) {
                newWeight = parseFloat(newWeight);
                statsData.weightHistory.push(newWeight);
                if (statsData.weightHistory.length > 7) statsData.weightHistory.shift();
                if (newWeight < statsData.bestWeight) statsData.bestWeight = newWeight;
                statsData.weight = newWeight;
                updateUI();
            }
        });

        document.getElementById('updateStepsBtn').addEventListener('click', () => {
            let newSteps = prompt('Введите количество шагов за сегодня:', statsData.steps);
            if (newSteps && !isNaN(newSteps)) {
                statsData.steps = parseInt(newSteps);
                updateUI();
            }
        });

        loadFromLocalStorage();
    </script>
</body>
</html>
