<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FOCUS — Родительский контроль</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px;
        }
        .phone {
            width: 375px;
            height: 700px;
            background: #111117;
            border-radius: 52px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 8px #1c1c24, 0 0 0 12px #2c2c34;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .screen {
            flex: 1;
            padding: 12px 16px 10px 16px;
            display: flex;
            flex-direction: column;
            background: #111117;
            height: 100%;
            overflow: hidden;
            scrollbar-width: none;
        }
        .screen::-webkit-scrollbar { display: none; }
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .back-btn {
            font-size: 22px; cursor: pointer; width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,215,0,0.08); border-radius: 30px;
        }
        .title {
            font-size: 20px; font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #FFD966);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .child-card {
            background: rgba(30,30,42,0.5);
            border-radius: 14px;
            padding: 8px 12px;
            margin-bottom: 6px;
            border: 0.5px solid rgba(255,215,0,0.15);
            cursor: pointer;
        }
        .child-card:active { transform: scale(0.98); }
        .child-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .child-name { font-size: 14px; font-weight: 600; color: #FFD966; }
        .child-status { font-size: 10px; padding: 2px 6px; border-radius: 20px; }
        .status-active { background: rgba(76,175,80,0.2); color: #4CAF50; }
        .status-inactive { background: rgba(255,68,68,0.2); color: #ff4444; }
        .child-stats { font-size: 10px; color: #aaa; margin-top: 2px; display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-primary {
            background: rgba(255,215,0,0.1);
            border: 0.5px solid rgba(255,215,0,0.3);
            border-radius: 30px;
            padding: 8px;
            text-align: center;
            color: #FFD966;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            margin-top: 6px;
        }
        .empty-state { text-align: center; padding: 20px; color: #8e8e9e; font-size: 13px; }
        .footer-note { font-size: 9px; color: #6e6e7e; text-align: center; margin-top: 6px; }
        .children-scroll {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
        }
        .children-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="phone">
        <div class="screen">
            <div class="header">
                <div class="back-btn" onclick="location.href='index.html'">←</div>
                <div class="title">Родительский контроль</div>
            </div>

            <div class="children-scroll" id="childrenList"></div>

            <div class="btn-primary" id="addChildBtn">➕ Добавить ребёнка</div>
            <div class="footer-note">🔐 Доступно только на подписке Элита</div>
        </div>
    </div>

    <script>
        function loadChildren() {
            const saved = localStorage.getItem('focus_controlled_children');
            if (saved) return JSON.parse(saved);
            return [
                { id: 1, name: "Дима", status: "active", streak: 12, progress: 68, geolocation: true },
                { id: 2, name: "Маша", status: "inactive", streak: 3, progress: 34, geolocation: false }
            ];
        }

        function renderChildren() {
            const container = document.getElementById('childrenList');
            const children = loadChildren();
            if (children.length === 0) {
                container.innerHTML = '<div class="empty-state">👶 Нет подконтрольных детей<br>Нажмите "➕ Добавить ребёнка"</div>';
                return;
            }
            container.innerHTML = '';
            children.forEach(child => {
                const card = document.createElement('div');
                card.className = 'child-card';
                card.innerHTML = `
                    <div class="child-header">
                        <span class="child-name">👦 ${child.name}</span>
                        <span class="child-status ${child.status === 'active' ? 'status-active' : 'status-inactive'}">
                            ${child.status === 'active' ? '🟢 Активен' : '🔴 Не активен'}
                        </span>
                    </div>
                    <div class="child-stats">
                        <span>🔥 ${child.streak} дн.</span>
                        <span>📊 ${child.progress}%</span>
                        <span>${child.geolocation ? '📍 Вкл' : '📍 Выкл'}</span>
                    </div>
                `;
                card.addEventListener('click', () => {
                    localStorage.setItem('focus_selected_child', JSON.stringify(child));
                    window.location.href = 'control_child.html';
                });
                container.appendChild(card);
            });
        }

        document.getElementById('addChildBtn').addEventListener('click', () => {
            const name = prompt('Введите имя ребёнка:');
            if (name) {
                const children = loadChildren();
                children.push({
                    id: Date.now(),
                    name: name,
                    status: 'active',
                    streak: 0,
                    progress: 0,
                    geolocation: true
                });
                localStorage.setItem('focus_controlled_children', JSON.stringify(children));
                renderChildren();
            }
        });

        renderChildren();
    </script>
</body>
</html>
