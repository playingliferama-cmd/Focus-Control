<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FOCUS — Копировать рацион</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px;
        }
        .phone {
            width: 375px;
            height: 700px;
            background: #111117;
            border-radius: 52px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 8px #1c1c24, 0 0 0 12px #2c2c34;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #111117;
            overflow: hidden;
        }
        .header {
            padding: 14px 18px 8px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 0.5px solid rgba(255,215,0,0.1);
        }
        .back-btn {
            font-size: 24px; cursor: pointer; width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,215,0,0.08); border-radius: 30px;
        }
        .title {
            font-size: 24px; font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #FFD966);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        /* Календарь (верхняя половина) */
        .calendar-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px 18px;
            border-bottom: 0.5px solid rgba(255,255,255,0.05);
            max-height: 45%;
        }
        .month-title {
            color: #FFD966;
            margin: 12px 0 8px 0;
            font-size: 14px;
            font-weight: 600;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-bottom: 8px;
        }
        .weekday {
            font-size: 10px;
            color: #8e8e9e;
            text-align: center;
            padding: 4px;
        }
        .day-cell {
            text-align: center;
            padding: 8px 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            cursor: pointer;
            font-size: 12px;
            color: #fff;
            transition: 0.2s;
        }
        .day-cell.has-data {
            background: rgba(255,215,0,0.2);
            color: #FFD966;
        }
        .day-cell.selected {
            border: 1px solid #FFD966;
            background: rgba(255,215,0,0.3);
        }
        /* Детали дня (нижняя половина) */
        .details-container {
            flex: 1;
            padding: 12px 18px;
            overflow-y: auto;
        }
        .meal-card {
            background: rgba(30,30,42,0.5);
            border-radius: 16px;
            padding: 10px;
            margin-bottom: 12px;
            border: 0.5px solid rgba(255,215,0,0.15);
        }
        .meal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .meal-name {
            font-size: 14px;
            font-weight: 600;
            color: #FFD966;
        }
        .meal-time {
            font-size: 11px;
            color: #aaa;
        }
        .food-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 0.5px solid rgba(255,255,255,0.05);
        }
        .food-info {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }
        .food-icon { font-size: 14px; }
        .food-name { font-size: 12px; color: #fff; }
        .food-nutrition {
            display: flex;
            gap: 6px;
            font-size: 9px;
            color: #aaa;
        }
        .food-nutrition span { color: #FFD966; }
        .meal-total {
            text-align: right;
            font-size: 10px;
            color: #8e8e9e;
            margin-top: 6px;
            padding-top: 4px;
            border-top: 0.5px solid rgba(255,255,255,0.1);
        }
        .total-summary {
            background: rgba(30,30,42,0.8);
            border-radius: 16px;
            padding: 10px;
            margin-top: 8px;
            border: 0.5px solid rgba(255,215,0,0.2);
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .action-btn {
            flex: 1;
            background: rgba(255,215,0,0.1);
            border: 0.5px solid rgba(255,215,0,0.3);
            border-radius: 30px;
            padding: 10px;
            text-align: center;
            color: #FFD966;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .action-btn:active { transform: scale(0.98); }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #8e8e9e;
        }
        /* Модалки */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1a1a24;
            border-radius: 28px;
            width: 320px;
            padding: 20px;
            border: 0.5px solid #FFD966;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: #FFD966;
            margin-bottom: 16px;
            text-align: center;
        }
        .modal input, .modal select {
            width: 100%;
            background: rgba(30,30,42,0.8);
            border: 0.5px solid rgba(255,215,0,0.3);
            border-radius: 20px;
            padding: 10px;
            color: #fff;
            margin-bottom: 12px;
            outline: none;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .modal-btn {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 30px;
            cursor: pointer;
        }
        .modal-btn.save { background: rgba(255,215,0,0.15); color: #FFD966; }
        .modal-btn.cancel { background: rgba(255,255,255,0.1); color: #aaa; }
        .share-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }
        .share-btn {
            background: rgba(255,215,0,0.1);
            border: 0.5px solid rgba(255,215,0,0.3);
            border-radius: 30px;
            padding: 12px;
            text-align: center;
            color: #FFD966;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="screen">
            <div class="header">
                <div class="back-btn" onclick="location.href='fokus_nutrition.html'">←</div>
                <div class="title">Копировать рацион</div>
            </div>

            <div class="calendar-container" id="calendarContainer"></div>
            <div class="details-container" id="detailsContainer">
                <div class="empty-state">📅 Выберите день в календаре</div>
            </div>
        </div>
    </div>

    <!-- Модалка выбора даты назначения для копирования дня -->
    <div id="targetDateModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">📅 Копировать день</div>
            <input type="date" id="targetDateInput">
            <div class="modal-buttons">
                <div class="modal-btn save" id="confirmTargetDate">Сохранить</div>
                <div class="modal-btn cancel" id="cancelTargetDate">Отмена</div>
            </div>
        </div>
    </div>

    <!-- Модалка выбора периода -->
    <div id="periodModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">📅 Копировать период</div>
            <select id="periodDaysSelect">
                <option value="2">2 дня</option>
                <option value="3">3 дня</option>
                <option value="4">4 дня</option>
                <option value="5">5 дней</option>
                <option value="6">6 дней</option>
                <option value="7">7 дней</option>
            </select>
            <input type="date" id="periodStartDate" placeholder="Дата начала">
            <div class="modal-buttons">
                <div class="modal-btn save" id="confirmPeriod">Сохранить</div>
                <div class="modal-btn cancel" id="cancelPeriod">Отмена</div>
            </div>
        </div>
    </div>

    <!-- Модалка поделиться -->
    <div id="shareModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">📤 Поделиться рационом</div>
            <div class="share-buttons">
                <div class="share-btn" data-app="telegram">📱 Telegram</div>
                <div class="share-btn" data-app="whatsapp">💬 WhatsApp</div>
                <div class="share-btn" data-app="viber">📞 Viber</div>
                <div class="share-btn" data-app="copy">🔗 Копировать ссылку</div>
            </div>
            <div class="modal-buttons" style="margin-top: 16px;">
                <div class="modal-btn cancel" id="closeShareBtn">Закрыть</div>
            </div>
        </div>
    </div>

    <script>
        let selectedDate = null;
        let selectedData = null;
        
        function loadHistoryForDay(dateKey) {
            const saved = localStorage.getItem(`meal_history_${dateKey}`);
            return saved ? JSON.parse(saved) : null;
        }
        
        function getAllHistoryDays() {
            const days = [];
            const threeYearsAgo = new Date();
            threeYearsAgo.setFullYear(threeYearsAgo.getFullYear() - 3);
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('meal_history_')) {
                    const dateStr = key.replace('meal_history_', '');
                    const date = new Date(dateStr);
                    if (date >= threeYearsAgo) {
                        days.push(dateStr);
                    }
                }
            }
            return days;
        }
        
        function showDayDetails(dateKey) {
            const data = loadHistoryForDay(dateKey);
            const container = document.getElementById('detailsContainer');
            selectedData = data;
            
            if (!data) {
                container.innerHTML = `<div class="empty-state">📭 Нет данных за ${dateKey}</div>`;
                return;
            }
            
            let totalCal = 0, totalProt = 0, totalFat = 0, totalCarb = 0;
            let html = '';
            
            const mealNames = {
                breakfast: '🌅 Завтрак',
                snack1: '🍏 Перекус 1',
                lunch: '☀️ Обед',
                snack2: '🍎 Перекус 2',
                dinner: '🌙 Ужин'
            };
            
            for (let mealId in mealNames) {
                const mealData = data[mealId];
                if (mealData) {
                    html += `
                        <div class="meal-card">
                            <div class="meal-header">
                                <span class="meal-name">${mealNames[mealId]}</span>
                                <span class="meal-time">⏰ ${mealData.time || '--:--'}</span>
                            </div>
                    `;
                    if (mealData.items && mealData.items.length > 0) {
                        mealData.items.forEach(item => {
                            html += `
                                <div class="food-item">
                                    <div class="food-info">
                                        <span class="food-icon">${item.icon || '🍽️'}</span>
                                        <span class="food-name">${escapeHtml(item.name)}</span>
                                        <div class="food-nutrition">
                                            <span>${item.calories} ккал</span>
                                            <span>🥩${item.protein || 0}</span>
                                            <span>🧈${item.fat || 0}</span>
                                            <span>🍚${item.carbs || 0}</span>
                                        </div>
                                    </div>
                                </div>
                            `;
                            totalCal += item.calories || 0;
                            totalProt += item.protein || 0;
                            totalFat += item.fat || 0;
                            totalCarb += item.carbs || 0;
                        });
                    } else {
                        html += `<div style="padding: 8px 0; color: #666; font-size: 12px;">— нет блюд —</div>`;
                    }
                    html += `<div class="meal-total">Итого: ${mealData.total?.calories || 0} ккал | 🥩${mealData.total?.protein || 0} 🧈${mealData.total?.fat || 0} 🍚${mealData.total?.carbs || 0}</div></div>`;
                }
            }
            
            html += `
                <div class="total-summary">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                        <span>📊 ЗА ВЕСЬ ДЕНЬ</span>
                        <span style="color: #FFD966;">${totalCal} ккал</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 12px;">
                        <span>🥩 Белки: ${totalProt} г</span>
                        <span>🧈 Жиры: ${totalFat} г</span>
                        <span>🍚 Углеводы: ${totalCarb} г</span>
                    </div>
                </div>
                <div class="action-buttons">
                    <div class="action-btn" id="copyDayBtn">📋 Копировать день</div>
                    <div class="action-btn" id="copyPeriodBtn">📅 Копировать период</div>
                    <div class="action-btn" id="shareBtn">📤 Поделиться</div>
                </div>
            `;
            container.innerHTML = html;
            
            document.getElementById('copyDayBtn')?.addEventListener('click', () => openTargetDateModal());
            document.getElementById('copyPeriodBtn')?.addEventListener('click', () => openPeriodModal());
            document.getElementById('shareBtn')?.addEventListener('click', () => openShareModal());
        }
        
        function openTargetDateModal() {
            document.getElementById('targetDateModal').style.display = 'flex';
        }
        
        function openPeriodModal() {
            document.getElementById('periodModal').style.display = 'flex';
        }
        
        function openShareModal() {
            document.getElementById('shareModal').style.display = 'flex';
        }
        
        function copyDayToPlan(targetDate) {
            if (!selectedData) return;
            localStorage.setItem(`meal_plan_${targetDate}`, JSON.stringify(selectedData));
            alert(`Рацион скопирован в план на ${targetDate}`);
            document.getElementById('targetDateModal').style.display = 'none';
        }
        
        function copyPeriodToPlan(days, startDate) {
            if (!selectedData) return;
            const sourceData = selectedData;
            for (let i = 0; i < days; i++) {
                const targetDate = new Date(startDate);
                targetDate.setDate(targetDate.getDate() + i);
                const targetKey = targetDate.toISOString().slice(0,10);
                localStorage.setItem(`meal_plan_${targetKey}`, JSON.stringify(sourceData));
            }
            alert(`${days} дня(ей) скопированы в план, начиная с ${startDate}`);
            document.getElementById('periodModal').style.display = 'none';
        }
        
        function shareToApp(app) {
            const text = `Мой рацион питания за ${selectedDate}\nВсе блюда и КБЖУ в приложении FOCUS`;
            const url = `https://focus.app/share?date=${selectedDate}`;
            let shareUrl = '';
            switch(app) {
                case 'telegram': shareUrl = `https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`; break;
                case 'whatsapp': shareUrl = `https://wa.me/?text=${encodeURIComponent(text + ' ' + url)}`; break;
                case 'viber': shareUrl = `viber://forward?text=${encodeURIComponent(text + ' ' + url)}`; break;
                case 'copy': navigator.clipboard.writeText(`${text}\n${url}`); alert('Ссылка скопирована'); return;
            }
            if (shareUrl) window.open(shareUrl, '_blank');
            document.getElementById('shareModal').style.display = 'none';
        }
        
        function renderCalendar() {
            const container = document.getElementById('calendarContainer');
            container.innerHTML = '';
            const today = new Date();
            const startYear = today.getFullYear() - 3;
            const endYear = today.getFullYear() + 1;
            const daysWithData = getAllHistoryDays();
            
            for (let year = startYear; year <= endYear; year++) {
                for (let month = 0; month < 12; month++) {
                    const date = new Date(year, month, 1);
                    const monthName = date.toLocaleString('ru', { month: 'long', year: 'numeric' });
                    const monthDiv = document.createElement('div');
                    monthDiv.innerHTML = `<div class="month-title">📆 ${monthName}</div>`;
                    
                    const weekGrid = document.createElement('div');
                    weekGrid.className = 'calendar-grid';
                    ['ПН','ВТ','СР','ЧТ','ПТ','СБ','ВС'].forEach(d => {
                        const w = document.createElement('div');
                        w.className = 'weekday';
                        w.innerText = d;
                        weekGrid.appendChild(w);
                    });
                    monthDiv.appendChild(weekGrid);
                    
                    const daysGrid = document.createElement('div');
                    daysGrid.className = 'calendar-grid';
                    let firstDay = new Date(year, month, 1).getDay();
                    firstDay = firstDay === 0 ? 7 : firstDay;
                    for (let i = 1; i < firstDay; i++) {
                        const empty = document.createElement('div');
                        daysGrid.appendChild(empty);
                    }
                    
                    const daysInMonth = new Date(year, month + 1, 0).getDate();
                    for (let d = 1; d <= daysInMonth; d++) {
                        const dayDate = new Date(year, month, d);
                        const dateKey = dayDate.toISOString().slice(0,10);
                        const hasData = daysWithData.includes(dateKey);
                        const dayCell = document.createElement('div');
                        dayCell.className = 'day-cell';
                        if (hasData) dayCell.classList.add('has-data');
                        if (selectedDate === dateKey) dayCell.classList.add('selected');
                        dayCell.innerText = d;
                        dayCell.addEventListener('click', () => {
                            selectedDate = dateKey;
                            renderCalendar();
                            showDayDetails(dateKey);
                        });
                        daysGrid.appendChild(dayCell);
                    }
                    monthDiv.appendChild(daysGrid);
                    container.appendChild(monthDiv);
                }
            }
        }
        
        document.getElementById('confirmTargetDate')?.addEventListener('click', () => {
            const targetDate = document.getElementById('targetDateInput').value;
            if (!targetDate) { alert('Выберите дату'); return; }
            copyDayToPlan(targetDate);
        });
        document.getElementById('cancelTargetDate')?.addEventListener('click', () => {
            document.getElementById('targetDateModal').style.display = 'none';
        });
        document.getElementById('confirmPeriod')?.addEventListener('click', () => {
            const days = parseInt(document.getElementById('periodDaysSelect').value);
            const startDate = document.getElementById('periodStartDate').value;
            if (!startDate) { alert('Выберите дату начала'); return; }
            copyPeriodToPlan(days, startDate);
        });
        document.getElementById('cancelPeriod')?.addEventListener('click', () => {
            document.getElementById('periodModal').style.display = 'none';
        });
        document.getElementById('closeShareBtn')?.addEventListener('click', () => {
            document.getElementById('shareModal').style.display = 'none';
        });
        document.querySelectorAll('.share-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                shareToApp(btn.dataset.app);
            });
        });
        
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
        }
        
        renderCalendar();
    </script>
</body>
</html>
