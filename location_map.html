<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FOCUS — Карта</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px;
        }
        .phone {
            width: 375px;
            height: 700px;
            background: #111117;
            border-radius: 52px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 8px #1c1c24, 0 0 0 12px #2c2c34;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .screen {
            flex: 1;
            padding: 10px 14px 8px 14px;
            display: flex;
            flex-direction: column;
            background: #111117;
            height: 100%;
            overflow: hidden;
            scrollbar-width: none;
        }
        .screen::-webkit-scrollbar { display: none; }
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .back-btn {
            font-size: 22px; cursor: pointer; width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,215,0,0.08); border-radius: 30px;
        }
        .title {
            font-size: 18px; font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #FFD966);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .map-placeholder {
            flex: 1;
            background: rgba(30,30,42,0.5);
            border-radius: 16px;
            border: 0.5px solid rgba(255,215,0,0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 160px;
        }
        .map-icon { font-size: 40px; margin-bottom: 6px; }
        .map-text { color: #8e8e9e; font-size: 12px; }
        .map-address { font-size: 11px; color: #6e6e7e; margin-top: 4px; }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 12px;
            margin: 6px 0;
        }
        .info-item { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 0.5px solid rgba(255,255,255,0.03); }
        .info-label { color: #8e8e9e; font-size: 10px; }
        .info-value { color: #FFD966; font-size: 10px; font-weight: 500; }
        .geofence-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 0;
            border-bottom: 0.5px solid rgba(255,255,255,0.03);
        }
        .geofence-name { color: #fff; font-size: 11px; }
        .geofence-status { font-size: 10px; }
        .status-in { color: #4CAF50; }
        .status-out { color: #ff4444; }
        .btn-row { display: flex; gap: 6px; margin-top: 4px; }
        .btn-sm {
            flex: 1;
            background: rgba(255,215,0,0.08);
            border: 0.5px solid rgba(255,215,0,0.2);
            border-radius: 30px;
            padding: 5px;
            text-align: center;
            color: #FFD966;
            cursor: pointer;
            font-size: 10px;
            font-weight: 500;
        }
        .section-title { color: #FFD966; font-weight: 600; font-size: 11px; margin: 4px 0 2px 0; }
    </style>
</head>
<body>
    <div class="phone">
        <div class="screen">
            <div class="header">
                <div class="back-btn" onclick="location.href='control.html'">←</div>
                <div class="title">🗺️ Карта: Дима</div>
            </div>

            <div class="map-placeholder">
                <div class="map-icon">🗺️</div>
                <div class="map-text">Карта загружается...</div>
                <div class="map-address">📍 ул. Ленина, 15, Москва</div>
            </div>

            <div class="info-grid">
                <div class="info-item"><span class="info-label">📍 Положение</span><span class="info-value">ул. Ленина, 15</span></div>
                <div class="info-item"><span class="info-label">🕐 Обновлено</span><span class="info-value">2 мин назад</span></div>
                <div class="info-item"><span class="info-label">🔋 Батарея</span><span class="info-value">67%</span></div>
                <div class="info-item"><span class="info-label">📶 Связь</span><span class="info-value">Хорошая</span></div>
            </div>

            <div class="section-title">🏠 ГЕОЗОНЫ</div>
            <div class="geofence-item"><span class="geofence-name">🏠 Дом</span><span class="geofence-status status-in">🟢 В зоне</span></div>
            <div class="geofence-item"><span class="geofence-name">🏫 Школа</span><span class="geofence-status status-out">🔴 Не в зоне</span></div>
            <div class="geofence-item"><span class="geofence-name">🏋️ Тренировка</span><span class="geofence-status status-out">🔴 Не в зоне</span></div>

            <div class="btn-row">
                <div class="btn-sm" id="refreshLocationBtn">🔄 Обновить</div>
                <div class="btn-sm" id="historyBtn">📋 История</div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('refreshLocationBtn').addEventListener('click', function() {
            alert('📍 Местоположение обновлено: ул. Ленина, 15, Москва');
        });

        document.getElementById('historyBtn').addEventListener('click', function() {
            alert('📋 История перемещений:\n14:00 — ул. Ленина, 15\n13:00 — ул. Школьная, 1\n12:00 — ул. Ленина, 15');
        });
    </script>
</body>
</html>
