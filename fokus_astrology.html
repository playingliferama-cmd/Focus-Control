            background: linear-gradient(135deg, #FFFFFF, #FFD966);

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
        }

    </style>
</head>

        let viewCount = 0;
        let horoscopeHistory = [];

        function getToday() { return new Date().toISOString().slice(0, 10); }

        function init() {
            const savedSign = localStorage.getItem('focus_zodiac_sign');
            const savedViewCount = localStorage.getItem('focus_astrology_views');
            const savedHistory = localStorage.getItem('focus_astrology_history');

            if (savedViewCount) viewCount = parseInt(savedViewCount) || 0;
            if (savedHistory) horoscopeHistory = JSON.parse(savedHistory);

            renderZodiacGrid();
            if (savedSign && zodiacSigns.find(z => z.id === savedSign)) {
                currentSign = savedSign;
                showHoroscope(savedSign);
            } else {
                document.getElementById('horoscopeTitle').innerHTML = '♈ Овен';
                document.getElementById('horoscopeText').innerHTML = 'Выберите свой знак зодиака, чтобы увидеть гороскоп на сегодня.';
                document.getElementById('ratingRow').innerHTML = '';
            }
        }

        function renderZodiacGrid() {
            const grid = document.getElementById('zodiacGrid');
            grid.innerHTML = '';
            zodiacSigns.forEach(z => {
                const btn = document.createElement('div');
                btn.className = 'zodiac-btn' + (currentSign === z.id ? ' active' : '');
                btn.innerHTML = `${z.name}<span class="sign-label">${z.label}</span>`;
                btn.dataset.id = z.id;
                btn.addEventListener('click', () => {
                    currentSign = z.id;
                    localStorage.setItem('focus_zodiac_sign', z.id);
                    renderZodiacGrid();
                    showHoroscope(z.id);
                });
                grid.appendChild(btn);
            });
        }

        function showHoroscope(signId) {
            const sign = zodiacSigns.find(z => z.id === signId);
            if (!sign) return;

            const today = getToday();
            const isFree = viewCount < 3;

            const todayEntry = horoscopeHistory.find(h => h.date === today && h.sign === signId);
            if (todayEntry) {
                displayHoroscope(sign, todayEntry);
                return;
            }

            if (!isFree) {
                const coins = parseInt(localStorage.getItem('focus_coins')) || 0;
                if (coins < 15) {
                    document.getElementById('horoscopeTitle').innerHTML = `${sign.name} ${sign.label}`;
                    document.getElementById('horoscopeText').innerHTML = 'Недостаточно F-coins (нужно 15). Пополните баланс в магазине.';
                    document.getElementById('ratingRow').innerHTML = '';
                    return;
                }
                localStorage.setItem('focus_coins', coins - 15);
                viewCount++;
                localStorage.setItem('focus_astrology_views', viewCount);
            } else {
                viewCount++;
                localStorage.setItem('focus_astrology_views', viewCount);
            }

            const horoscope = dailyHoroscopes[signId];
            if (!horoscope) return;

            const entry = {
                date: today,
                sign: signId,
                text: horoscope.text,
                ratings: horoscope.ratings
            };

            horoscopeHistory = horoscopeHistory.filter(h => !(h.date === today && h.sign === signId));
            horoscopeHistory.push(entry);
            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
            horoscopeHistory = horoscopeHistory.filter(h => new Date(h.date) >= sevenDaysAgo);
            localStorage.setItem('focus_astrology_history', JSON.stringify(horoscopeHistory));

            displayHoroscope(sign, entry);
        }

        function displayHoroscope(sign, entry) {
            document.getElementById('horoscopeTitle').innerHTML = `${sign.name} ${sign.label}`;
            document.getElementById('horoscopeText').innerHTML = entry.text;
            const ratings = entry.ratings;
            const labels = { love: '💖', work: '💼', finance: '💰', health: '🧠' };
            const names = { love: 'Любовь', work: 'Работа', finance: 'Финансы', health: 'Здоровье' };
            let html = '';
            for (let key in ratings) {
                const val = ratings[key];
                html += `
                    <div class="rating-item">
                        <span class="label">${labels[key]} ${names[key]}:</span>
                        <span class="stars">
                            ${Array.from({ length: 5 }, (_, i) => {
                                if (i < val) {
                                    return `<span class="star filled" style="font-size: 12px; line-height: 1;">⭐</span>`;
                                } else {
                                    return `<span class="star" style="font-size: 12px; line-height: 1; color: #333;">☆</span>`;
                                }
                            }).join('')}
                        </span>
                    </div>
                `;
            }
            document.getElementById('ratingRow').innerHTML = html;
        }

        document.getElementById('archiveBtn').addEventListener('click', () => {
            const list = document.getElementById('archiveList');
            list.innerHTML = '';
            if (horoscopeHistory.length === 0) {
                list.innerHTML = '<div style="text-align:center;color:#6e6e7e;padding:20px;">Нет сохранённых гороскопов</div>';
            } else {
                horoscopeHistory.slice().reverse().forEach(h => {
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    const sign = zodiacSigns.find(z => z.id === h.sign);
                    const avg = Math.floor((h.ratings.love + h.ratings.work + h.ratings.finance + h.ratings.health) / 4);
                    const starStr = '⭐'.repeat(Math.min(avg, 5));
                    div.innerHTML = `
                        <div class="date">📅 ${h.date} ${sign ? sign.name : ''}</div>
                        <div class="text">${h.text.substring(0, 60)}${h.text.length > 60 ? '...' : ''}</div>
                        <div class="stars-small">${starStr}</div>
                    `;
                    list.appendChild(div);
                });
            }
            document.getElementById('archiveModal').style.display = 'flex';
        });

        document.getElementById('closeArchiveBtn').addEventListener('click', () => {
            document.getElementById('archiveModal').style.display = 'none';
        });
        document.getElementById('archiveModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) document.getElementById('archiveModal').style.display = 'none';
        });

        document.getElementById('compatBtn').addEventListener('click', function() {
            const date = document.getElementById('compatDate').value;
            if (!date) { alert('Введите дату рождения партнёра'); return; }

            const coins = parseInt(localStorage.getItem('focus_coins')) || 0;
            if (coins < 100) { alert('Недостаточно F-coins (нужно 100). Пополните баланс в магазине.'); return; }
            localStorage.setItem('focus_coins', coins - 100);

            const sign1 = zodiacSigns.find(z => z.id === currentSign);
            if (!sign1) { alert('Сначала выберите свой знак зодиака'); return; }

            const sign2 = getZodiacByDate(new Date(date));
            if (!sign2) { alert('Не удалось определить знак партнёра'); return; }

            const compat = getCompatibility(sign1, sign2);
            document.getElementById('compatResult').style.display = 'block';
            document.getElementById('compatPct').innerHTML = compat.percentage + '%';
            document.getElementById('compatDesc').innerHTML = compat.text;
        });

        function getZodiacByDate(date) {
            const month = date.getMonth() + 1;
            const day = date.getDate();
            if ((month === 3 && day >= 21) || (month === 4 && day <= 19)) return zodiacSigns.find(z => z.id === 'aries');
            if ((month === 4 && day >= 20) || (month === 5 && day <= 20)) return zodiacSigns.find(z => z.id === 'taurus');
            if ((month === 5 && day >= 21) || (month === 6 && day <= 21)) return zodiacSigns.find(z => z.id === 'gemini');
            if ((month === 6 && day >= 22) || (month === 7 && day <= 22)) return zodiacSigns.find(z => z.id === 'cancer');
            if ((month === 7 && day >= 23) || (month === 8 && day <= 22)) return zodiacSigns.find(z => z.id === 'leo');
            if ((month === 8 && day >= 23) || (month === 9 && day <= 22)) return zodiacSigns.find(z => z.id === 'virgo');
            if ((month === 9 && day >= 23) || (month === 10 && day <= 22)) return zodiacSigns.find(z => z.id === 'libra');
            if ((month === 10 && day >= 23) || (month === 11 && day <= 21)) return zodiacSigns.find(z => z.id === 'scorpio');
            if ((month === 11 && day >= 22) || (month === 12 && day <= 21)) return zodiacSigns.find(z => z.id === 'sagittarius');
            if ((month === 12 && day >= 22) || (month === 1 && day <= 19)) return zodiacSigns.find(z => z.id === 'capricorn');
            if ((month === 1 && day >= 20) || (month === 2 && day <= 18)) return zodiacSigns.find(z => z.id === 'aquarius');
            if ((month === 2 && day >= 19) || (month === 3 && day <= 20)) return zodiacSigns.find(z => z.id === 'pisces');
            return null;
        }

        function getCompatibility(sign1, sign2) {
            const key = `${sign1.element}-${sign2.element}`;
            const keyRev = `${sign2.element}-${sign1.element}`;
            let text = compatibilityTexts[key] || compatibilityTexts[keyRev] || 'У вас интересное сочетание!';
            let base = 50;
            if (sign1.element === sign2.element) base = 85;
            else if ((sign1.element === 'fire' && sign2.element === 'air') || (sign1.element === 'air' && sign2.element === 'fire')) base = 75;
            else if ((sign1.element === 'earth' && sign2.element === 'water') || (sign1.element === 'water' && sign2.element === 'earth')) base = 80;
            else if ((sign1.element === 'fire' && sign2.element === 'earth') || (sign1.element === 'earth' && sign2.element === 'fire')) base = 50;
            else if ((sign1.element === 'fire' && sign2.element === 'water') || (sign1.element === 'water' && sign2.element === 'fire')) base = 40;
            else if ((sign1.element === 'earth' && sign2.element === 'air') || (sign1.element === 'air' && sign2.element === 'earth')) base = 45;
            else if ((sign1.element === 'air' && sign2.element === 'water') || (sign1.element === 'water' && sign2.element === 'air')) base = 55;
            const variation = Math.floor(Math.random() * 10) - 5;
            const percentage = Math.min(100, Math.max(20, base + variation));
            return { percentage, text };
        }

        init();
    </script>
</body>
</html>
