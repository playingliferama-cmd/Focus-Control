    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

            display: flex;
            justify-content: center;
            align-items: center;

            margin: 0;
            padding: 12px;
        }
        .phone {

            display: flex;
            flex-direction: column;
        }
        .screen {
            flex: 1;

            flex-direction: column;
            background: #111117;
            height: 100%;
            overflow: hidden;
            scrollbar-width: none;

            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

            display: flex; align-items: center; justify-content: center;
            background: rgba(255,215,0,0.08); border-radius: 30px;
        }
        .title {
            font-size: 20px; font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #FFD966);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
        }
        .scroll-area::-webkit-scrollbar { display: none; }

        .input-card {
            background: rgba(30,30,42,0.5);
            border-radius: 16px;
            padding: 12px;

            margin-top: 4px;

            padding: 12px;
            margin-bottom: 10px;
            border: 0.5px solid rgba(255,215,0,0.15);

            border-radius: 12px;
            padding: 8px;
            text-align: center;

            border-radius: 30px;
            padding: 8px;
            text-align: center;

            width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            z-index: 100;
            justify-content: center;
            align-items: center;

    </style>
</head>

        let viewCount = 0;
        let numerologyHistory = [];
        let currentResult = null;

        function getToday() { return new Date().toISOString().slice(0, 10); }

        function init() {
            const savedViewCount = localStorage.getItem('focus_numerology_views');
            const savedHistory = localStorage.getItem('focus_numerology_history');
            if (savedViewCount) viewCount = parseInt(savedViewCount) || 0;
            if (savedHistory) numerologyHistory = JSON.parse(savedHistory);
        }

        function calculateNumbers() {
            const birthDate = document.getElementById('birthDate').value;
            const fullName = document.getElementById('fullName').value.trim();

            if (!birthDate) {
                alert('Введите дату рождения');
                return;
            }

            // Проверка на бесплатные просмотры
            const isFree = viewCount < 3;
            if (!isFree) {
                const coins = parseInt(localStorage.getItem('focus_coins')) || 0;
                if (coins < 20) {
                    alert('Недостаточно F-coins (нужно 20). Пополните баланс в магазине.');
                    return;
                }
                localStorage.setItem('focus_coins', coins - 20);
            }
            viewCount++;
            localStorage.setItem('focus_numerology_views', viewCount);

            const dateParts = birthDate.split('-');
            const year = parseInt(dateParts[0]);
            const month = parseInt(dateParts[1]);
            const day = parseInt(dateParts[2]);

            // Расчёт чисел
            const destinyNumber = calculateDestinyNumber(day, month, year);
            const soulNumber = calculateSoulNumber(day);
            const missionNumber = calculateMissionNumber(year);
            let nameNumber = null;
            if (fullName) {
                nameNumber = calculateNameNumber(fullName);
            }

            const result = {
                date: getToday(),
                birthDate: birthDate,
                destinyNumber: destinyNumber,
                soulNumber: soulNumber,
                missionNumber: missionNumber,
                nameNumber: nameNumber,
                fullName: fullName || 'не указано'
            };

            // Сохраняем в историю
            numerologyHistory = numerologyHistory.filter(h => h.date !== getToday());
            numerologyHistory.push(result);
            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
            numerologyHistory = numerologyHistory.filter(h => new Date(h.date) >= sevenDaysAgo);
            localStorage.setItem('focus_numerology_history', JSON.stringify(numerologyHistory));

            currentResult = result;
            displayResult(result);
        }

        function calculateDestinyNumber(day, month, year) {
            let sum = day + month + year;
            while (sum > 9 && sum !== 11 && sum !== 22 && sum !== 33) {
                let digits = sum.toString().split('').map(Number);
                sum = digits.reduce((a, b) => a + b, 0);
            }
            return sum;
        }

        function calculateSoulNumber(day) {
            let sum = day;
            while (sum > 9 && sum !== 11 && sum !== 22 && sum !== 33) {
                let digits = sum.toString().split('').map(Number);
                sum = digits.reduce((a, b) => a + b, 0);
            }
            return sum;
        }

        function calculateMissionNumber(year) {
            let sum = year;
            while (sum > 9 && sum !== 11 && sum !== 22 && sum !== 33) {
                let digits = sum.toString().split('').map(Number);
                sum = digits.reduce((a, b) => a + b, 0);
            }
            return sum;
        }

        function calculateNameNumber(name) {
            const letters = 'абвгдеёжзийклмнопрстуфхцчшщъыьэюя';
            let sum = 0;
            for (let char of name.toLowerCase()) {
                const idx = letters.indexOf(char);
                if (idx !== -1) {
                    const num = (idx % 9) + 1;
                    sum += num;
                }
            }
            while (sum > 9 && sum !== 11 && sum !== 22 && sum !== 33) {
                let digits = sum.toString().split('').map(Number);
                sum = digits.reduce((a, b) => a + b, 0);
            }
            return sum;
        }

        function displayResult(result) {
            const container = document.getElementById('resultContainer');
            container.style.display = 'block';

            // Числа
            const grid = document.getElementById('numbersGrid');
            let html = `
                <div class="number-item"><div class="num">${result.destinyNumber}</div><div class="label">Число Судьбы</div></div>
                <div class="number-item"><div class="num">${result.soulNumber}</div><div class="label">Число Души</div></div>
                <div class="number-item"><div class="num">${result.missionNumber}</div><div class="label">Число Миссии</div></div>
                <div class="number-item"><div class="num">${result.nameNumber !== null ? result.nameNumber : '—'}</div><div class="label">Число Имени</div></div>
            `;
            grid.innerHTML = html;

            // Описание
            const desc = descriptions[result.destinyNumber];
            if (desc) {
                document.getElementById('descriptionText').innerHTML = desc.text;
                document.getElementById('yearlyText').innerHTML = desc.yearly;
            } else {
                document.getElementById('descriptionText').innerHTML = 'Описание для вашего числа пока не готово.';
                document.getElementById('yearlyText').innerHTML = 'Прогноз пока не готов.';
            }
        }

        // ===== СОВМЕСТИМОСТЬ =====
        document.getElementById('compatBtn').addEventListener('click', function() {
            const compatNumber = parseInt(document.getElementById('compatNumber').value);
            if (!compatNumber || isNaN(compatNumber)) {
                alert('Введите число судьбы партнёра (1–9, 11, 22, 33)');
                return;
            }
            if (!currentResult) {
                alert('Сначала рассчитайте свою нумерологию');
                return;
            }

            const coins = parseInt(localStorage.getItem('focus_coins')) || 0;
            if (coins < 100) {
                alert('Недостаточно F-coins (нужно 100). Пополните баланс в магазине.');
                return;
            }
            localStorage.setItem('focus_coins', coins - 100);

            const key1 = currentResult.destinyNumber;
            const key2 = compatNumber;
            const key = `${Math.min(key1, key2)}-${Math.max(key1, key2)}`;
            const compat = compatibilityTexts[key] || { pct: 50, text: 'У вас интересное сочетание чисел. Попробуйте узнать больше!' };

            document.getElementById('compatResult').style.display = 'block';
            document.getElementById('compatPct').innerHTML = compat.pct + '%';
            document.getElementById('compatDesc').innerHTML = compat.text;
        });

        // ===== АРХИВ =====
        document.getElementById('archiveBtn').addEventListener('click', () => {
            const list = document.getElementById('archiveList');
            list.innerHTML = '';
            if (numerologyHistory.length === 0) {
                list.innerHTML = '<div style="text-align:center;color:#6e6e7e;padding:20px;">Нет сохранённых расчётов</div>';
            } else {
                numerologyHistory.slice().reverse().forEach(h => {
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    div.innerHTML = `
                        <div class="date">📅 ${h.date}</div>
                        <div class="text">Число Судьбы: ${h.destinyNumber}</div>
                        <div class="text" style="font-size: 10px; color: #aaa;">${h.fullName}</div>
                    `;
                    list.appendChild(div);
                });
            }
            document.getElementById('archiveModal').style.display = 'flex';
        });

        document.getElementById('closeArchiveBtn').addEventListener('click', () => {
            document.getElementById('archiveModal').style.display = 'none';
        });
        document.getElementById('archiveModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) document.getElementById('archiveModal').style.display = 'none';
        });

        document.getElementById('calculateBtn').addEventListener('click', calculateNumbers);

        init();
