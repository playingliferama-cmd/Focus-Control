<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Анкета — FOCUS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px;
        }

        .phone {
            width: 375px;
            height: 700px;
            background: #111117;
            border-radius: 52px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 8px #1c1c24, 0 0 0 12px #2c2c34;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            background: #111117;
            overflow-y: auto;
        }

        .header {
            margin-bottom: 20px;
        }

        .back-btn {
            font-size: 28px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 215, 0, 0.08);
            border-radius: 30px;
            margin-bottom: 16px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #FFD966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 13px;
            color: #8e8e9e;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .label {
            font-size: 13px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 6px;
            display: block;
        }

        .label span {
            color: #FFD966;
            font-size: 11px;
            margin-left: 8px;
        }

        .input {
            width: 100%;
            background: rgba(30, 30, 42, 0.5);
            border: 0.5px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .input:focus {
            border-color: #FFD966;
        }

        .bonus {
            font-size: 11px;
            color: #8e8e9e;
            margin-top: 4px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FFD966, #FFAA33);
            border: none;
            border-radius: 40px;
            padding: 12px;
            color: #0a0a0f;
            font-weight: 700;
            font-size: 15px;
            text-align: center;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            margin-bottom: 12px;
        }

        .btn-secondary {
            background: rgba(255, 215, 0, 0.08);
            border: 0.5px solid rgba(255, 215, 0, 0.3);
            border-radius: 40px;
            padding: 12px;
            color: #FFD966;
            font-weight: 600;
            font-size: 14px;
            text-align: center;
            cursor: pointer;
            width: 100%;
        }

        .coin-particle {
            position: fixed;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #FFD966, #FFAA33);
            border-radius: 50%;
            box-shadow: 0 0 8px gold;
            animation: flyToBalance 0.8s ease-out forwards;
            pointer-events: none;
            z-index: 1000;
        }

        @keyframes flyToBalance {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-150px) translateX(60px) scale(0.3);
                opacity: 0;
            }
        }

        .coin-notification {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            border: 1px solid gold;
            border-radius: 30px;
            padding: 12px 24px;
            text-align: center;
            color: gold;
            font-weight: bold;
            z-index: 1001;
            animation: fadeOut 2s forwards;
            pointer-events: none;
            font-size: 16px;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -80%) scale(0.8); }
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="screen">
            <div class="header">
                <div class="back-btn" onclick="location.href='confirm.html'">←</div>
                <div class="title">Заполни анкету</div>
                <div class="subtitle">Получи бонусы за каждое поле</div>
            </div>

            <div class="form-group">
                <div class="label">👤 ИМЯ <span>+5 монет</span></div>
                <input type="text" class="input" id="name" placeholder="Как вас зовут?">
            </div>

            <div class="form-group">
                <div class="label">🎂 ВОЗРАСТ <span>+5 монет</span></div>
                <input type="number" class="input" id="age" placeholder="Сколько лет?">
            </div>

            <div class="form-group">
                <div class="label">🏙️ ГОРОД <span>+10 монет</span></div>
                <input type="text" class="input" id="city" placeholder="Где вы живёте?">
                <div class="bonus">⭐ Необязательно, но приятно</div>
            </div>

            <div class="form-group">
                <div class="label">📱 ТЕЛЕФОН <span>+20 монет</span></div>
                <input type="tel" class="input" id="phone" placeholder="+7 999 123-45-67">
                <div class="bonus">⭐ Необязательно, но приятно</div>
            </div>

            <button class="btn-primary" id="saveBtn">💾 СОХРАНИТЬ И ПРОДОЛЖИТЬ</button>
            <button class="btn-secondary" id="skipBtn">🔘 ПРОПУСТИТЬ (без бонусов)</button>
        </div>
    </div>

    <script>
        function playCoinSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = 880;
                gainNode.gain.value = 0.15;
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
                oscillator.stop(audioCtx.currentTime + 0.5);
            } catch(e) { console.log('Звук не поддерживается'); }
        }

        function showCoinAnimation(amount, reason) {
            const notification = document.createElement('div');
            notification.className = 'coin-notification';
            notification.innerHTML = `+${amount} F-coins<br><span style="font-size:11px;">${reason}</span>`;
            document.body.appendChild(notification);

            for (let i = 0; i < 10; i++) {
                const coin = document.createElement('div');
                coin.className = 'coin-particle';
                coin.style.left = Math.random() * window.innerWidth + 'px';
                coin.style.top = window.innerHeight / 2 + (Math.random() - 0.5) * 100 + 'px';
                coin.style.animationDelay = Math.random() * 0.3 + 's';
                document.body.appendChild(coin);
                setTimeout(() => coin.remove(), 1000);
            }

            playCoinSound();

            setTimeout(() => notification.remove(), 2000);
        }

        const savedName = localStorage.getItem('focus_user_name');
        const savedAge = localStorage.getItem('focus_user_age');
        const savedCity = localStorage.getItem('focus_user_city');
        const savedPhone = localStorage.getItem('focus_user_phone');

        if (savedName) document.getElementById('name').value = savedName;
        if (savedAge) document.getElementById('age').value = savedAge;
        if (savedCity) document.getElementById('city').value = savedCity;
        if (savedPhone) document.getElementById('phone').value = savedPhone;

        let coins = parseInt(localStorage.getItem('focus_coins')) || 0;

        function updateCoins() {
            localStorage.setItem('focus_coins', coins);
        }

        document.getElementById('saveBtn').addEventListener('click', function() {
            const name = document.getElementById('name').value.trim();
            const age = document.getElementById('age').value.trim();
            const city = document.getElementById('city').value.trim();
            const phone = document.getElementById('phone').value.trim();

            if (!name) {
                alert('Введите ваше имя');
                return;
            }
            if (!age || isNaN(age) || age < 1 || age > 120) {
                alert('Введите корректный возраст');
                return;
            }

            let bonusCoins = 0;

            if (!savedName && name) {
                bonusCoins += 5;
                localStorage.setItem('focus_user_name', name);
            }
            if (!savedAge && age) {
                bonusCoins += 5;
                localStorage.setItem('focus_user_age', age);
            }
            if (!savedCity && city) {
                bonusCoins += 10;
                localStorage.setItem('focus_user_city', city);
            }
            if (!savedPhone && phone) {
                bonusCoins += 20;
                localStorage.setItem('focus_user_phone', phone);
            }

            if (bonusCoins > 0) {
                coins += bonusCoins;
                updateCoins();
                showCoinAnimation(bonusCoins, 'Заполнение анкеты');
            }

            localStorage.setItem('focus_profile_completed', 'true');
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);
        });

        document.getElementById('skipBtn').addEventListener('click', function() {
            if (!localStorage.getItem('focus_profile_completed')) {
                localStorage.setItem('focus_profile_completed', 'true');
            }
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
