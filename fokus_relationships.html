<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LS Control — Отношения</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px;
        }

        .phone {
            width: 375px;
            height: 700px;
            background: #111117;
            border-radius: 52px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 8px #1c1c24, 0 0 0 12px #2c2c34;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen {
            flex: 1;
            padding: 14px 18px 12px 18px;
            display: flex;
            flex-direction: column;
            background: #111117;
            height: 100%;
            overflow: hidden;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 215, 0, 0.08);
            border-radius: 30px;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: translateX(-3px);
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #FFD966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .scroll-content {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .scroll-content::-webkit-scrollbar {
            display: none;
        }

        .balance-card {
            background: rgba(30, 30, 42, 0.5);
            border-radius: 20px;
            padding: 14px;
            border: 0.5px solid rgba(255, 215, 0, 0.15);
        }

        .balance-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .balance-label {
            font-size: 14px;
            color: #aaa;
        }

        .balance-value {
            font-size: 16px;
            font-weight: 600;
            color: #FFD966;
        }

        .balance-total {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
            font-size: 15px;
            font-weight: 700;
            color: #FFD966;
        }

        .categories-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .category-card {
            background: rgba(30, 30, 42, 0.5);
            border-radius: 20px;
            padding: 14px;
            border: 0.5px solid rgba(255, 215, 0, 0.15);
            cursor: pointer;
            transition: 0.2s;
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .category-name {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }

        .category-count {
            font-size: 12px;
            color: #FFD966;
        }

        .person-card {
            background: rgba(30, 30, 42, 0.5);
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 12px;
            border: 0.5px solid rgba(255, 215, 0, 0.15);
        }

        .person-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .person-name {
            font-size: 17px;
            font-weight: 600;
            color: #FFD966;
        }

        .person-actions {
            display: flex;
            gap: 12px;
        }

        .person-info {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 4px;
        }

        .person-detail {
            font-size: 13px;
            color: #fff;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
        }

        .task-check {
            width: 20px;
            height: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            cursor: pointer;
        }

        .task-check.completed {
            background: rgba(255, 215, 0, 0.2);
            border-color: #FFD966;
        }

        .small-btn {
            background: rgba(255, 215, 0, 0.08);
            border: 0.5px solid rgba(255, 215, 0, 0.2);
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 12px;
            color: #FFD966;
            cursor: pointer;
            text-align: center;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1a1a24;
            border-radius: 28px;
            width: 300px;
            padding: 20px;
            border: 0.5px solid #FFD966;
            max-height: 80%;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: #FFD966;
            margin-bottom: 16px;
        }

        .modal input, .modal textarea, .modal select {
            width: 100%;
            background: rgba(30, 30, 42, 0.8);
            border: 0.5px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            padding: 10px 14px;
            color: #fff;
            font-size: 13px;
            margin-bottom: 12px;
            outline: none;
            font-family: inherit;
        }

        .modal textarea {
            min-height: 60px;
        }

        .tab-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0 6px;
            background: rgba(18, 18, 24, 0.9);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(255,255,255,0.06);
            margin-top: 12px;
            border-radius: 32px;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            color: #6e6e7e;
            font-size: 9px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .tab-item.active {
            color: #ffd966;
            background: rgba(255, 217, 102, 0.1);
        }

        .tab-icon {
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="screen" id="mainScreen">
            <div class="section-header">
                <div class="header-left">
                    <div class="back-btn" onclick="location.href='index.html'">←</div>
                    <div class="section-title">Отношения</div>
                </div>
                <div class="small-btn" id="showTrashBtn">🗑️ Корзина</div>
            </div>

            <div class="scroll-content">
                <div class="balance-card" id="balanceCard">
                    <div class="balance-row"><span class="balance-label">💰 Мне должны:</span><span class="balance-value" id="totalOwedToMe">0 ₽</span></div>
                    <div class="balance-row"><span class="balance-label">💸 Я должен:</span><span class="balance-value" id="totalIOwe">0 ₽</span></div>
                    <div class="balance-total" id="netBalance">⚖️ Чистый баланс: 0 ₽</div>
                </div>
                <div class="categories-grid" id="categoriesGrid"></div>
            </div>

            <div class="tab-bar">
                <div class="tab-item" onclick="location.href='fokus_progress.html'">
                    <span class="tab-icon">📈</span>
                    <span>Прогресс</span>
                </div>
                <div class="tab-item active">
                    <span class="tab-icon">👥</span>
                    <span>Отношения</span>
                </div>
                <div class="tab-item" onclick="location.href='fokus_profile.html'">
                    <span class="tab-icon">👤</span>
                    <span>Профиль</span>
                </div>
            </div>
        </div>
    </div>

    <div id="categoryModal" class="modal"><div class="modal-content" id="categoryModalContent"></div></div>
    <div id="personModal" class="modal"><div class="modal-content" id="personModalContent"></div></div>
    <div id="trashModal" class="modal"><div class="modal-content" id="trashModalContent"></div></div>

    <script>
        let categories = [
            { id: 'friends', name: '👥 Друзья', icon: '👥' },
            { id: 'love', name: '❤️ Противоположный пол', icon: '❤️' },
            { id: 'parents', name: '👪 Родители', icon: '👪' },
            { id: 'relatives', name: '🧬 Родственники', icon: '🧬' },
            { id: 'colleagues', name: '💼 Коллеги', icon: '💼' },
            { id: 'me', name: '🙋‍♂️ Я', icon: '🙋‍♂️' }
        ];
        let people = [];
        let trash = [];
        let currentCategory = null;

        function loadData() {
            const saved = localStorage.getItem('ls_control_relationships');
            if (saved) people = JSON.parse(saved);
            const savedTrash = localStorage.getItem('ls_control_relationships_trash');
            if (savedTrash) trash = JSON.parse(savedTrash);
            renderCategories();
            updateBalance();
        }

        function saveData() {
            localStorage.setItem('ls_control_relationships', JSON.stringify(people));
            localStorage.setItem('ls_control_relationships_trash', JSON.stringify(trash));
        }

        function updateBalance() {
            let totalOwedToMe = 0;
            let totalIOwe = 0;
            people.forEach(p => {
                totalOwedToMe += p.owedToMe || 0;
                totalIOwe += p.iOwe || 0;
            });
            document.getElementById('totalOwedToMe').innerText = totalOwedToMe.toLocaleString() + ' ₽';
            document.getElementById('totalIOwe').innerText = totalIOwe.toLocaleString() + ' ₽';
            const net = totalOwedToMe - totalIOwe;
            document.getElementById('netBalance').innerHTML = `⚖️ Чистый баланс: ${net >= 0 ? '+' : ''}${net.toLocaleString()} ₽`;
        }

        function renderCategories() {
            const container = document.getElementById('categoriesGrid');
            container.innerHTML = '';
            categories.forEach(cat => {
                const count = people.filter(p => p.category === cat.id).length;
                const card = document.createElement('div');
                card.className = 'category-card';
                card.innerHTML = `<div class="category-header"><span class="category-name">${cat.name}</span><span class="category-count">${count} чел</span></div>`;
                card.addEventListener('click', () => openCategory(cat.id));
                container.appendChild(card);
            });
        }

        function openCategory(catId) {
            currentCategory = catId;
            const cat = categories.find(c => c.id === catId);
            const categoryPeople = people.filter(p => p.category === catId);
            const container = document.getElementById('categoryModalContent');
            container.innerHTML = `
                <div class="modal-title">${cat.name}</div>
                <div class="small-btn" id="addPersonBtn" style="margin-bottom:16px;">➕ Добавить человека</div>
                <div id="peopleList"></div>
                <div class="small-btn" id="closeCategoryBtn">Назад</div>
            `;
            document.getElementById('categoryModal').style.display = 'flex';
            renderPeopleList(categoryPeople);
            document.getElementById('addPersonBtn').addEventListener('click', () => openPersonModal(null));
            document.getElementById('closeCategoryBtn').addEventListener('click', () => document.getElementById('categoryModal').style.display = 'none');
        }

        function renderPeopleList(peopleList) {
            const container = document.getElementById('peopleList');
            container.innerHTML = '';
            peopleList.forEach(person => {
                const card = document.createElement('div');
                card.className = 'person-card';
                card.innerHTML = `
                    <div class="person-header">
                        <span class="person-name">${escapeHtml(person.name)}</span>
                        <div class="person-actions">
                            <span class="small-btn edit-person" data-id="${person.id}" style="padding:4px 8px;">✏️</span>
                            <span class="small-btn delete-person" data-id="${person.id}" style="padding:4px 8px;">🗑️</span>
                        </div>
                    </div>
                    <div class="person-info">📅 ${person.birthday || '—'}</div>
                    <div class="person-info">💼 ${person.profession || '—'}</div>
                    <div class="person-info">💰 Должен мне: ${(person.owedToMe || 0).toLocaleString()} ₽</div>
                    <div class="person-info">💸 Я должен: ${(person.iOwe || 0).toLocaleString()} ₽</div>
                    <div class="person-detail" id="tasks-${person.id}"></div>
                    <div class="small-btn add-task" data-id="${person.id}" style="margin-top:8px; padding:4px;">➕ Задача</div>
                `;
                container.appendChild(card);
                const tasksContainer = document.getElementById(`tasks-${person.id}`);
                if (tasksContainer && person.tasks) {
                    tasksContainer.innerHTML = '<div style="font-size:12px; color:#FFD966; margin-bottom:4px;">📋 Задачи:</div>';
                    person.tasks.forEach((task, idx) => {
                        const taskDiv = document.createElement('div');
                        taskDiv.className = 'task-item';
                        taskDiv.innerHTML = `
                            <div class="task-check ${task.completed ? 'completed' : ''}" data-person="${person.id}" data-task="${idx}"></div>
                            <span style="font-size:12px; ${task.completed ? 'text-decoration:line-through; color:#666;' : 'color:#fff;'}">${escapeHtml(task.text)}</span>
                        `;
                        tasksContainer.appendChild(taskDiv);
                    });
                }
            });
            document.querySelectorAll('.edit-person').forEach(el => {
                el.addEventListener('click', () => {
                    const id = parseInt(el.dataset.id);
                    const person = people.find(p => p.id === id);
                    if (person) openPersonModal(person);
                });
            });
            document.querySelectorAll('.delete-person').forEach(el => {
                el.addEventListener('click', () => {
                    const id = parseInt(el.dataset.id);
                    const person = people.find(p => p.id === id);
                    if (person && confirm(`Удалить ${person.name}?`)) {
                        trash.push({ ...person, deletedAt: new Date().toLocaleDateString() });
                        people = people.filter(p => p.id !== id);
                        saveData();
                        openCategory(currentCategory);
                        updateBalance();
                    }
                });
            });
            document.querySelectorAll('.add-task').forEach(el => {
                el.addEventListener('click', () => {
                    const id = parseInt(el.dataset.id);
                    const person = people.find(p => p.id === id);
                    if (person) {
                        const taskText = prompt('Введите задачу:');
                        if (taskText) {
                            if (!person.tasks) person.tasks = [];
                            person.tasks.push({ text: taskText, completed: false });
                            saveData();
                            openCategory(currentCategory);
                        }
                    }
                });
            });
            document.querySelectorAll('.task-check').forEach(el => {
                el.addEventListener('click', () => {
                    const personId = parseInt(el.dataset.person);
                    const taskIdx = parseInt(el.dataset.task);
                    const person = people.find(p => p.id === personId);
                    if (person && person.tasks[taskIdx]) {
                        person.tasks[taskIdx].completed = !person.tasks[taskIdx].completed;
                        saveData();
                        openCategory(currentCategory);
                    }
                });
            });
        }

        function openPersonModal(person) {
            const isEdit = !!person;
            const container = document.getElementById('personModalContent');
            container.innerHTML = `
                <div class="modal-title">${isEdit ? '✏️ Редактировать' : '➕ Новый человек'}</div>
                <input type="text" id="personName" placeholder="Имя" value="${isEdit ? escapeHtml(person.name) : ''}">
                <input type="date" id="personBirthday" placeholder="Дата рождения" value="${isEdit ? person.birthday || '' : ''}">
                <textarea id="personInfo" placeholder="Общая информация (кто, где живёт и т.д.)">${isEdit ? escapeHtml(person.info || '') : ''}</textarea>
                <input type="text" id="personProfession" placeholder="💼 Профессия / Навыки" value="${isEdit ? escapeHtml(person.profession || '') : ''}">
                <textarea id="personHelpFrom" placeholder="🎁 Чем может быть полезен">${isEdit ? escapeHtml(person.helpFrom || '') : ''}</textarea>
                <textarea id="personHelpTo" placeholder="🤝 Чем я могу быть полезен">${isEdit ? escapeHtml(person.helpTo || '') : ''}</textarea>
                <textarea id="personTraits" placeholder="🧠 Особенности (заметки о личности)">${isEdit ? escapeHtml(person.traits || '') : ''}</textarea>
                <input type="number" id="personOwedToMe" placeholder="💰 Должен мне (₽)" value="${isEdit ? person.owedToMe || 0 : 0}">
                <input type="number" id="personIOwe" placeholder="💸 Я должен ему (₽)" value="${isEdit ? person.iOwe || 0 : 0}">
                <div class="small-btn" id="savePersonBtn">💾 Сохранить</div>
                <div class="small-btn" id="closePersonBtn" style="margin-top:8px;">Отмена</div>
            `;
            document.getElementById('personModal').style.display = 'flex';
            document.getElementById('savePersonBtn').addEventListener('click', () => {
                const name = document.getElementById('personName').value.trim();
                if (!name) return;
                const personData = {
                    id: isEdit ? person.id : Date.now(),
                    category: currentCategory,
                    name: name,
                    birthday: document.getElementById('personBirthday').value,
                    info: document.getElementById('personInfo').value,
                    profession: document.getElementById('personProfession').value,
                    helpFrom: document.getElementById('personHelpFrom').value,
                    helpTo: document.getElementById('personHelpTo').value,
                    traits: document.getElementById('personTraits').value,
                    owedToMe: parseInt(document.getElementById('personOwedToMe').value) || 0,
                    iOwe: parseInt(document.getElementById('personIOwe').value) || 0,
                    tasks: isEdit ? person.tasks || [] : []
                };
                if (isEdit) {
                    const index = people.findIndex(p => p.id === person.id);
                    if (index !== -1) people[index] = personData;
                } else people.push(personData);
                saveData();
                document.getElementById('personModal').style.display = 'none';
                openCategory(currentCategory);
                updateBalance();
            });
            document.getElementById('closePersonBtn').addEventListener('click', () => {
                document.getElementById('personModal').style.display = 'none';
            });
        }

        document.getElementById('showTrashBtn').addEventListener('click', () => {
            const container = document.getElementById('trashModalContent');
            container.innerHTML = `<div class="modal-title">🗑️ Корзина</div><div id="trashList"></div><div class="small-btn" id="closeTrashBtn">Закрыть</div>`;
            document.getElementById('trashModal').style.display = 'flex';
            const trashList = document.getElementById('trashList');
            trashList.innerHTML = '';
            trash.forEach(person => {
                const div = document.createElement('div');
                div.className = 'person-card';
                div.innerHTML = `
                    <div class="person-header"><span class="person-name">${escapeHtml(person.name)}</span></div>
                    <div class="small-btn restore-person" data-id="${person.id}" style="margin-top:8px;">♻️ Восстановить</div>
                `;
                trashList.appendChild(div);
            });
            document.querySelectorAll('.restore-person').forEach(el => {
                el.addEventListener('click', () => {
                    const id = parseInt(el.dataset.id);
                    const person = trash.find(t => t.id === id);
                    if (person) {
                        people.push(person);
                        trash = trash.filter(t => t.id !== id);
                        saveData();
                        document.getElementById('trashModal').style.display = 'none';
                        renderCategories();
                        updateBalance();
                    }
                });
            });
            document.getElementById('closeTrashBtn').addEventListener('click', () => {
                document.getElementById('trashModal').style.display = 'none';
            });
        });

        function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

        loadData();
    </script>
</body>
</html>
