<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FOCUS — Стать исполнителем</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px;
        }
        .phone {
            width: 375px;
            height: 700px;
            background: #111117;
            border-radius: 52px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 8px #1c1c24, 0 0 0 12px #2c2c34;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .screen {
            flex: 1;
            padding: 12px 16px 10px 16px;
            display: flex;
            flex-direction: column;
            background: #111117;
            height: 100%;
            overflow: hidden;
            scrollbar-width: none;
        }
        .screen::-webkit-scrollbar { display: none; }
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .back-btn {
            font-size: 22px; cursor: pointer; width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,215,0,0.08); border-radius: 30px;
        }
        .title {
            font-size: 20px; font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #FFD966);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
        }
        .scroll-area::-webkit-scrollbar { display: none; }

        .card {
            background: rgba(30,30,42,0.5);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 10px;
            border: 0.5px solid rgba(255,215,0,0.15);
        }
        .label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 4px;
            display: block;
        }
        .input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 0.5px solid rgba(255,215,0,0.2);
            border-radius: 16px;
            padding: 8px 12px;
            color: #fff;
            font-size: 13px;
            outline: none;
            margin-bottom: 8px;
            font-family: inherit;
        }
        .input::placeholder { color: #6e6e7e; }
        textarea.input { resize: none; min-height: 70px; }

        .checkbox-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            margin: 4px 0 8px 0;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #aaa;
            cursor: pointer;
        }
        .checkbox-item input[type="checkbox"] { accent-color: #FFD966; cursor: pointer; width: 14px; height: 14px; }

        .btn-primary {
            background: rgba(255,215,0,0.15);
            border: 0.5px solid rgba(255,215,0,0.3);
            border-radius: 30px;
            padding: 10px;
            text-align: center;
            color: #FFD966;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-primary:active { transform: scale(0.98); }
        .info-text { font-size: 10px; color: #6e6e7e; text-align: center; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="phone">
        <div class="screen">
            <div class="header">
                <div class="back-btn" onclick="location.href='fokus_oracle.html'">←</div>
                <div class="title">🧙‍♂️ Стать исполнителем</div>
            </div>

            <div class="scroll-area">
                <div class="card">
                    <span class="label">👤 Ваше имя</span>
                    <input type="text" class="input" id="psychicName" placeholder="Как вас зовут?">

                    <span class="label">📋 Выберите категории (до 3)</span>
                    <div class="checkbox-grid" id="categoryGrid"></div>

                    <span class="label">📝 Опишите ваш опыт</span>
                    <textarea class="input" id="psychicExperience" placeholder="Сколько лет практики, какие методы используете..."></textarea>

                    <span class="label">📞 Контакты</span>
                    <input type="text" class="input" id="psychicContacts" placeholder="Telegram / WhatsApp">

                    <div class="btn-primary" id="submitPsychicBtn">📨 ОТПРАВИТЬ ЗАЯВКУ</div>
                    <div class="info-text">Заявка будет рассмотрена в течение 24 часов</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const categories = [
            { id: 'tarot', label: 'Таролог' },
            { id: 'astrology', label: 'Астролог' },
            { id: 'numerology', label: 'Нумеролог' },
            { id: 'lead_pour', label: 'Отлив свинцом' },
            { id: 'runes', label: 'Рунолог' },
            { id: 'palmistry', label: 'Хиромант' },
            { id: 'clairvoyant', label: 'Ясновидящий' },
            { id: 'shaman', label: 'Шаман' }
        ];

        function renderCategories() {
            const grid = document.getElementById('categoryGrid');
            grid.innerHTML = '';
            categories.forEach(cat => {
                const div = document.createElement('div');
                div.className = 'checkbox-item';
                div.innerHTML = `
                    <input type="checkbox" id="cat_${cat.id}" value="${cat.id}">
                    <label for="cat_${cat.id}">${cat.label}</label>
                `;
                grid.appendChild(div);
            });
        }

        document.getElementById('submitPsychicBtn').addEventListener('click', function() {
            const name = document.getElementById('psychicName').value.trim();
            const experience = document.getElementById('psychicExperience').value.trim();
            const contacts = document.getElementById('psychicContacts').value.trim();

            if (!name) { alert('Введите ваше имя'); return; }
            if (!experience) { alert('Опишите ваш опыт'); return; }
            if (!contacts) { alert('Введите контакты'); return; }

            const selected = [];
            document.querySelectorAll('#categoryGrid input:checked').forEach(cb => {
                selected.push(cb.value);
            });
            if (selected.length === 0) { alert('Выберите хотя бы одну категорию'); return; }
            if (selected.length > 3) { alert('Максимум 3 категории'); return; }

            const userEmail = localStorage.getItem('focus_user_email') || 'user@example.com';
            const userName = localStorage.getItem('focus_user_name') || name;

            const application = {
                id: Date.now(),
                email: userEmail,
                name: userName,
                categories: selected,
                experience: experience,
                contacts: contacts,
                status: 'pending',
                createdAt: new Date().toISOString()
            };

            const apps = JSON.parse(localStorage.getItem('focus_psychic_applications') || '[]');
            apps.push(application);
            localStorage.setItem('focus_psychic_applications', JSON.stringify(apps));

            alert('✅ Заявка отправлена! Ожидайте подтверждения.');
            window.location.href = 'fokus_oracle.html';
        });

        renderCategories();
    </script>
</body>
</html>
