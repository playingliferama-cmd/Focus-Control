<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FOCUS — Прогресс</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px;
        }

        .phone {
            width: 375px;
            height: 700px;
            background: #111117;
            border-radius: 52px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 8px #1c1c24, 0 0 0 12px #2c2c34;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen {
            flex: 1;
            padding: 24px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            background: #111117;
            height: 100%;
            overflow-y: auto;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .back-btn {
            font-size: 28px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 215, 0, 0.08);
            border-radius: 30px;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: translateX(-3px);
        }

        .section-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #FFD966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stats-card {
            background: rgba(30, 30, 42, 0.5);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 0.5px solid rgba(255, 215, 0, 0.15);
        }

        .stats-title {
            font-size: 16px;
            font-weight: 600;
            color: #FFD966;
            margin-bottom: 16px;
        }

        .calendar {
            margin-bottom: 20px;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 10px;
            color: #8e8e9e;
            font-size: 12px;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #fff;
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
        }

        .day.active {
            background: rgba(255, 215, 0, 0.2);
            color: #FFD966;
        }

        .streak {
            text-align: center;
            margin-bottom: 20px;
        }

        .streak-value {
            font-size: 28px;
            font-weight: 700;
            color: #FFD966;
        }

        .section-stats {
            margin-top: 10px;
        }

        .section-item {
            margin-bottom: 12px;
        }

        .section-header-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FFD966, #FFAA33);
            border-radius: 6px;
            width: 0%;
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="screen">
            <div class="section-header">
                <div class="back-btn" onclick="location.href='index.html'">←</div>
                <div class="section-title">Прогресс</div>
            </div>

            <div class="stats-card">
                <div class="stats-title">📅 Активность</div>
                <div class="streak">
                    <div class="streak-value">7 дней</div>
                    <div style="font-size: 13px; color: #aaa;">подряд 🔥</div>
                </div>
                <div class="calendar">
                    <div class="weekdays">
                        <span>ПН</span><span>ВТ</span><span>СР</span><span>ЧТ</span><span>ПТ</span><span>СБ</span><span>ВС</span>
                    </div>
                    <div class="days" id="calendarDays"></div>
                </div>
            </div>

            <div class="stats-card">
                <div class="stats-title">📊 Общая статистика</div>
                <div class="section-stats">
                    <div class="section-item">
                        <div class="section-header-stats"><span>💪 Физическое тело</span><span>65%</span></div>
                        <div class="progress-bar"><div class="progress-fill" style="width: 65%;"></div></div>
                    </div>
                    <div class="section-item">
                        <div class="section-header-stats"><span>🧠 Ментальное здоровье</span><span>72%</span></div>
                        <div class="progress-bar"><div class="progress-fill" style="width: 72%;"></div></div>
                    </div>
                    <div class="section-item">
                        <div class="section-header-stats"><span>🔥 Вера и ритуалы</span><span>48%</span></div>
                        <div class="progress-bar"><div class="progress-fill" style="width: 48%;"></div></div>
                    </div>
                    <div class="section-item">
                        <div class="section-header-stats"><span>⚡ Энергия</span><span>70%</span></div>
                        <div class="progress-bar"><div class="progress-fill" style="width: 70%;"></div></div>
                    </div>
                    <div class="section-item">
                        <div class="section-header-stats"><span>🎁 Поощрение</span><span>55%</span></div>
                        <div class="progress-bar"><div class="progress-fill" style="width: 55%;"></div></div>
                    </div>
                    <div class="section-item">
                        <div class="section-header-stats"><span>👥 Отношения</span><span>30%</span></div>
                        <div class="progress-bar"><div class="progress-fill" style="width: 30%;"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function generateCalendar() {
            const container = document.getElementById('calendarDays');
            container.innerHTML = '';
            for (let i = 1; i <= 30; i++) {
                const day = document.createElement('div');
                day.className = 'day';
                day.innerText = i;
                if (i <= 7) day.classList.add('active');
                container.appendChild(day);
            }
        }
        generateCalendar();
    </script>
</body>
</html>
