<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LS Control — Поощрение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px;
        }

        .phone {
            width: 375px;
            height: 700px;
            background: #111117;
            border-radius: 52px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 8px #1c1c24, 0 0 0 12px #2c2c34;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen {
            flex: 1;
            padding: 14px 18px 12px 18px;
            display: flex;
            flex-direction: column;
            background: #111117;
            height: 100%;
            overflow: hidden;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 215, 0, 0.08);
            border-radius: 30px;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: translateX(-3px);
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #FFD966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .scroll-content {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .scroll-content::-webkit-scrollbar {
            display: none;
        }

        .card {
            background: rgba(30, 30, 42, 0.5);
            border-radius: 20px;
            padding: 16px;
            border: 0.5px solid rgba(255, 215, 0, 0.15);
        }

        .card-title {
            font-size: 17px;
            font-weight: 600;
            color: #FFD966;
            margin-bottom: 14px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FFD966, #FFAA33);
            border-radius: 10px;
            width: 0%;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .reward-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.08);
        }

        .reward-info {
            flex: 1;
        }

        .reward-name {
            font-size: 15px;
            font-weight: 500;
            color: #fff;
        }

        .reward-limit {
            font-size: 11px;
            color: #8e8e9e;
        }

        .reward-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .reward-count {
            font-size: 14px;
            color: #FFD966;
        }

        .reward-btn {
            background: rgba(255, 215, 0, 0.1);
            border: 0.5px solid rgba(255, 215, 0, 0.3);
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 12px;
            color: #FFD966;
            cursor: pointer;
        }

        .reward-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .exception-item {
            background: rgba(255, 215, 0, 0.05);
            border-radius: 16px;
            margin-bottom: 10px;
            padding: 10px;
        }

        .small-btn {
            background: rgba(255, 215, 0, 0.08);
            border: 0.5px solid rgba(255, 215, 0, 0.2);
            border-radius: 30px;
            padding: 8px;
            text-align: center;
            font-size: 13px;
            color: #FFD966;
            cursor: pointer;
            margin-top: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1a1a24;
            border-radius: 28px;
            width: 300px;
            padding: 20px;
            border: 0.5px solid #FFD966;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: #FFD966;
            margin-bottom: 16px;
        }

        .modal input {
            width: 100%;
            background: rgba(30, 30, 42, 0.8);
            border: 0.5px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            padding: 10px;
            color: #fff;
            margin-bottom: 12px;
            outline: none;
        }

        .tab-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0 6px;
            background: rgba(18, 18, 24, 0.9);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(255,255,255,0.06);
            margin-top: 12px;
            border-radius: 32px;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            color: #6e6e7e;
            font-size: 9px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .tab-item.active {
            color: #ffd966;
            background: rgba(255, 217, 102, 0.1);
        }

        .tab-icon {
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="screen">
            <div class="section-header">
                <div class="header-left">
                    <div class="back-btn" onclick="location.href='index.html'">←</div>
                    <div class="section-title">Поощрение</div>
                </div>
            </div>

            <div class="scroll-content">
                <!-- Статистика недели -->
                <div class="card">
                    <div class="card-title">📊 Недельный лимит</div>
                    <div class="stats-row"><span>Использовано наград:</span><span id="usedWeek">0</span></div>
                    <div class="stats-row"><span>Доступно:</span><span id="leftWeek">5</span></div>
                    <div class="progress-bar"><div class="progress-fill" id="weekProgress" style="width:0%"></div></div>
                </div>

                <!-- Обычные награды -->
                <div class="card">
                    <div class="card-title">🎁 Мои награды</div>
                    <div id="rewardsList"></div>
                    <div class="small-btn" id="addRewardBtn">➕ Добавить награду</div>
                </div>

                <!-- Исключения (Праздник) -->
                <div class="card">
                    <div class="card-title">🌟 Исключения (Праздник)</div>
                    <div class="stats-row"><span>Использовано исключений:</span><span id="usedException">0</span></div>
                    <div class="stats-row"><span>Доступно в месяц:</span><span id="leftException">2</span></div>
                    <div id="exceptionsList"></div>
                    <div class="small-btn" id="addExceptionBtn">➕ Добавить исключение</div>
                </div>
            </div>

            <div class="tab-bar">
                <div class="tab-item" onclick="location.href='fokus_progress.html'">
                    <span class="tab-icon">📈</span>
                    <span>Прогресс</span>
                </div>
                <div class="tab-item active">
                    <span class="tab-icon">🎁</span>
                    <span>Поощрение</span>
                </div>
                <div class="tab-item" onclick="location.href='fokus_profile.html'">
                    <span class="tab-icon">👤</span>
                    <span>Профиль</span>
                </div>
            </div>
        </div>
    </div>

    <div id="rewardModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">➕ Новая награда</div>
            <input type="text" id="rewardName" placeholder="Название">
            <input type="number" id="rewardLimit" placeholder="Лимит в неделю">
            <div class="small-btn" id="saveRewardBtn">Сохранить</div>
            <div class="small-btn" id="closeRewardBtn" style="margin-top:8px;">Отмена</div>
        </div>
    </div>

    <div id="exceptionModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">➕ Новое исключение</div>
            <input type="text" id="exceptionName" placeholder="Название">
            <input type="number" id="exceptionLimit" placeholder="Лимит в месяц">
            <div class="small-btn" id="saveExceptionBtn">Сохранить</div>
            <div class="small-btn" id="closeExceptionBtn" style="margin-top:8px;">Отмена</div>
        </div>
    </div>

    <script>
        let rewards = [];
        let exceptions = [];
        let weekUsed = 0;
        let weekLimit = 5;
        let exceptionUsed = 0;
        let exceptionLimit = 2;

        function loadData() {
            const savedRewards = localStorage.getItem('ls_control_rewards');
            if (savedRewards) rewards = JSON.parse(savedRewards);
            else rewards = [
                { id: 1, name: "🍕 Пицца", limit: 1, used: 0 },
                { id: 2, name: "🍷 Бокал вина", limit: 1, used: 0 },
                { id: 3, name: "🎬 Сериал (1 час)", limit: 2, used: 0 },
                { id: 4, name: "🛋️ Ничегонеделание", limit: 2, used: 0 },
                { id: 5, name: "🍔 Читмил", limit: 1, used: 0 }
            ];
            const savedExceptions = localStorage.getItem('ls_control_exceptions');
            if (savedExceptions) exceptions = JSON.parse(savedExceptions);
            else exceptions = [
                { id: 1, name: "🍕 Пицца в 2 часа ночи", limit: 1, used: 0 },
                { id: 2, name: "🥃 Дорогой виски", limit: 1, used: 0 },
                { id: 3, name: "🎮 Вся ночь за игрой", limit: 1, used: 0 }
            ];
            const savedWeek = localStorage.getItem('ls_control_week_used');
            if (savedWeek) weekUsed = parseInt(savedWeek);
            const savedExceptionUsed = localStorage.getItem('ls_control_exception_used');
            if (savedExceptionUsed) exceptionUsed = parseInt(savedExceptionUsed);
            checkWeekReset();
            checkMonthReset();
            renderRewards();
            renderExceptions();
            updateStats();
        }

        function checkWeekReset() {
            const lastWeek = localStorage.getItem('ls_control_last_week');
            const now = new Date();
            const weekNum = getWeekNumber(now);
            if (lastWeek && parseInt(lastWeek) !== weekNum) {
                weekUsed = 0;
                rewards.forEach(r => r.used = 0);
                localStorage.setItem('ls_control_week_used', weekUsed);
                saveRewards();
            }
            localStorage.setItem('ls_control_last_week', weekNum);
        }

        function checkMonthReset() {
            const lastMonth = localStorage.getItem('ls_control_last_month');
            const now = new Date();
            const monthKey = `${now.getFullYear()}-${now.getMonth()}`;
            if (lastMonth && lastMonth !== monthKey) {
                exceptionUsed = 0;
                exceptions.forEach(e => e.used = 0);
                localStorage.setItem('ls_control_exception_used', exceptionUsed);
                saveExceptions();
            }
            localStorage.setItem('ls_control_last_month', monthKey);
        }

        function getWeekNumber(date) {
            const firstJan = new Date(date.getFullYear(), 0, 1);
            const days = Math.floor((date - firstJan) / (24 * 60 * 60 * 1000));
            return Math.ceil((days + firstJan.getDay() + 1) / 7);
        }

        function saveRewards() { localStorage.setItem('ls_control_rewards', JSON.stringify(rewards)); }
        function saveExceptions() { localStorage.setItem('ls_control_exceptions', JSON.stringify(exceptions)); }

        function updateStats() {
            const totalUsed = rewards.reduce((sum, r) => sum + r.used, 0);
            weekUsed = totalUsed;
            localStorage.setItem('ls_control_week_used', weekUsed);
            document.getElementById('usedWeek').innerText = weekUsed;
            document.getElementById('leftWeek').innerText = weekLimit - weekUsed;
            const weekPercent = (weekUsed / weekLimit) * 100;
            document.getElementById('weekProgress').style.width = Math.min(weekPercent, 100) + '%';
            document.getElementById('usedException').innerText = exceptionUsed;
            document.getElementById('leftException').innerText = exceptionLimit - exceptionUsed;
        }

        function renderRewards() {
            const container = document.getElementById('rewardsList');
            container.innerHTML = '';
            rewards.forEach(reward => {
                const div = document.createElement('div');
                div.className = 'reward-item';
                const remaining = reward.limit - reward.used;
                div.innerHTML = `
                    <div class="reward-info">
                        <div class="reward-name">${escapeHtml(reward.name)}</div>
                        <div class="reward-limit">${reward.used}/${reward.limit} в неделю</div>
                    </div>
                    <div class="reward-actions">
                        <span class="reward-count">${remaining > 0 ? remaining : 0}</span>
                        <div class="reward-btn ${remaining === 0 ? 'disabled' : ''}" data-id="${reward.id}">✅</div>
                    </div>
                `;
                container.appendChild(div);
            });
            document.querySelectorAll('.reward-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (btn.classList.contains('disabled')) return;
                    const id = parseInt(btn.dataset.id);
                    const reward = rewards.find(r => r.id === id);
                    if (reward && reward.used < reward.limit && weekUsed < weekLimit) {
                        reward.used++;
                        updateStats();
                        saveRewards();
                        renderRewards();
                        alert(`🎉 Ты заслужил! ${reward.name} — отличный выбор!`);
                    } else if (weekUsed >= weekLimit) alert('Недельный лимит наград исчерпан!');
                    else alert('Лимит этой награды на неделю исчерпан');
                });
            });
        }

        function renderExceptions() {
            const container = document.getElementById('exceptionsList');
            container.innerHTML = '';
            exceptions.forEach(exception => {
                const div = document.createElement('div');
                div.className = 'exception-item reward-item';
                const remaining = exception.limit - exception.used;
                div.innerHTML = `
                    <div class="reward-info">
                        <div class="reward-name">🌟 ${escapeHtml(exception.name)}</div>
                        <div class="reward-limit">${exception.used}/${exception.limit} в месяц</div>
                    </div>
                    <div class="reward-actions">
                        <span class="reward-count">${remaining > 0 ? remaining : 0}</span>
                        <div class="reward-btn ${remaining === 0 || exceptionUsed >= exceptionLimit ? 'disabled' : ''}" data-id="${exception.id}">🎉</div>
                    </div>
                `;
                container.appendChild(div);
            });
            document.querySelectorAll('#exceptionsList .reward-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (btn.classList.contains('disabled')) return;
                    const id = parseInt(btn.dataset.id);
                    const exception = exceptions.find(e => e.id === id);
                    if (exception && exception.used < exception.limit && exceptionUsed < exceptionLimit) {
                        exception.used++;
                        exceptionUsed++;
                        localStorage.setItem('ls_control_exception_used', exceptionUsed);
                        saveExceptions();
                        renderExceptions();
                        updateStats();
                        alert(`🎉 Исключение! ${exception.name} — ты это заслужил!`);
                    } else if (exceptionUsed >= exceptionLimit) alert('Месячный лимит исключений исчерпан!');
                    else alert('Лимит этого исключения исчерпан');
                });
            });
        }

        document.getElementById('addRewardBtn').addEventListener('click', () => document.getElementById('rewardModal').style.display = 'flex');
        document.getElementById('saveRewardBtn').addEventListener('click', () => {
            const name = document.getElementById('rewardName').value.trim();
            const limit = parseInt(document.getElementById('rewardLimit').value);
            if (name && !isNaN(limit) && limit > 0) {
                rewards.push({ id: Date.now(), name, limit, used: 0 });
                saveRewards();
                renderRewards();
                document.getElementById('rewardModal').style.display = 'none';
                document.getElementById('rewardName').value = '';
                document.getElementById('rewardLimit').value = '';
            }
        });
        document.getElementById('closeRewardBtn').addEventListener('click', () => document.getElementById('rewardModal').style.display = 'none');

        document.getElementById('addExceptionBtn').addEventListener('click', () => document.getElementById('exceptionModal').style.display = 'flex');
        document.getElementById('saveExceptionBtn').addEventListener('click', () => {
            const name = document.getElementById('exceptionName').value.trim();
            const limit = parseInt(document.getElementById('exceptionLimit').value);
            if (name && !isNaN(limit) && limit > 0) {
                exceptions.push({ id: Date.now(), name, limit, used: 0 });
                saveExceptions();
                renderExceptions();
                document.getElementById('exceptionModal').style.display = 'none';
                document.getElementById('exceptionName').value = '';
                document.getElementById('exceptionLimit').value = '';
            }
        });
        document.getElementById('closeExceptionBtn').addEventListener('click', () => document.getElementById('exceptionModal').style.display = 'none');

        function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

        loadData();
    </script>
</body>
</html>
