<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LS Control — Тренировки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px;
        }

        .phone {
            width: 375px;
            height: 700px;
            background: #111117;
            border-radius: 52px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 8px #1c1c24, 0 0 0 12px #2c2c34;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen {
            flex: 1;
            padding: 14px 18px 12px 18px;
            display: flex;
            flex-direction: column;
            background: #111117;
            height: 100%;
            overflow: hidden;
        }

        /* Шапка */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 215, 0, 0.08);
            border-radius: 30px;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: translateX(-3px);
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #FFD966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .add-workout-btn {
            background: rgba(255, 215, 0, 0.1);
            border: 0.5px solid rgba(255, 215, 0, 0.3);
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 12px;
            color: #FFD966;
            cursor: pointer;
            transition: 0.2s;
        }

        /* Список тренировок */
        .workouts-list {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 12px;
        }

        .workouts-list::-webkit-scrollbar {
            display: none;
        }

        .workout-card {
            background: rgba(30, 30, 42, 0.5);
            border-radius: 20px;
            padding: 14px;
            border: 0.5px solid rgba(255, 215, 0, 0.15);
            cursor: pointer;
            transition: all 0.2s;
        }

        .workout-card:hover {
            border-color: rgba(255, 215, 0, 0.4);
            background: rgba(255, 215, 0, 0.05);
        }

        .workout-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .workout-name {
            font-size: 17px;
            font-weight: 600;
            color: #FFD966;
        }

        .workout-actions {
            display: flex;
            gap: 10px;
        }

        .workout-edit, .workout-delete {
            font-size: 16px;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.2s;
            padding: 4px;
        }

        .workout-edit:hover, .workout-delete:hover {
            opacity: 1;
        }

        .workout-stats {
            font-size: 12px;
            color: #8e8e9e;
            margin-bottom: 8px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FFD966, #FFAA33);
            border-radius: 4px;
            width: 0%;
        }

        /* Экран тренировки */
        .training-screen {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .training-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .training-name {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #FFD966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .training-stats {
            background: rgba(30, 30, 42, 0.5);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .training-last {
            font-size: 12px;
            color: #8e8e9e;
            margin-bottom: 8px;
        }

        .training-progress {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 8px;
        }

        /* Список упражнений в тренировке */
        .exercises-list {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
            margin-bottom: 16px;
        }

        .exercises-list::-webkit-scrollbar {
            display: none;
        }

        .exercise-item {
            background: rgba(30, 30, 42, 0.5);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 8px;
        }

        .exercise-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .exercise-name {
            font-size: 15px;
            font-weight: 500;
            color: #fff;
        }

        .exercise-details {
            font-size: 13px;
            color: #FFD966;
        }

        .exercise-sets {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .set-info {
            font-size: 13px;
            color: #8e8e9e;
        }

        .exercise-check {
            width: 28px;
            height: 28px;
            border-radius: 30px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .exercise-check.checked {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd966;
        }

        .exercise-check.checked::after {
            content: "✓";
            color: #ffd966;
            font-size: 14px;
        }

        .exercise-actions {
            display: flex;
            gap: 8px;
        }

        .action-icon {
            font-size: 16px;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.2s;
            padding: 4px;
        }

        .action-icon:hover {
            opacity: 1;
        }

        .add-exercise-btn {
            background: rgba(255, 215, 0, 0.08);
            border: 0.5px dashed rgba(255, 215, 0, 0.3);
            border-radius: 30px;
            padding: 10px;
            text-align: center;
            font-size: 13px;
            color: #FFD966;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .complete-workout-btn {
            background: rgba(255, 215, 0, 0.15);
            border: 0.5px solid rgba(255, 215, 0, 0.3);
            border-radius: 30px;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            color: #FFD966;
            cursor: pointer;
            font-weight: 600;
        }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1a1a24;
            border-radius: 28px;
            width: 300px;
            padding: 20px;
            border: 0.5px solid #FFD966;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: #FFD966;
            margin-bottom: 16px;
        }

        .modal input, .modal select {
            width: 100%;
            background: rgba(30, 30, 42, 0.8);
            border: 0.5px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            padding: 10px 14px;
            color: #fff;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .modal-btn {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 30px;
            cursor: pointer;
        }

        .modal-btn.save {
            background: rgba(255, 215, 0, 0.15);
            color: #FFD966;
        }

        .modal-btn.cancel {
            background: rgba(255, 255, 255, 0.1);
            color: #aaa;
        }

        /* Нижняя навигация */
        .tab-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0 6px;
            background: rgba(18, 18, 24, 0.9);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(255,255,255,0.06);
            margin-top: 12px;
            border-radius: 32px;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            color: #6e6e7e;
            font-size: 9px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .tab-item.active {
            color: #ffd966;
            background: rgba(255, 217, 102, 0.1);
        }

        .tab-icon {
            font-size: 18px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="screen" id="mainScreen">
            <!-- Список тренировок (виден по умолчанию) -->
            <div class="section-header">
                <div class="header-left">
                    <div class="back-btn" onclick="location.href='fokus_body.html'">←</div>
                    <div class="section-title">Тренировки</div>
                </div>
                <div class="add-workout-btn" id="createWorkoutBtn">➕ Новая</div>
            </div>
            <div class="workouts-list" id="workoutsList"></div>
            <div class="tab-bar">
                <div class="tab-item" onclick="location.href='fokus_progress.html'">
                    <span class="tab-icon">📈</span>
                    <span>Прогресс</span>
                </div>
                <div class="tab-item active">
                    <span class="tab-icon">💪</span>
                    <span>Тело</span>
                </div>
                <div class="tab-item" onclick="location.href='fokus_profile.html'">
                    <span class="tab-icon">👤</span>
                    <span>Профиль</span>
                </div>
            </div>
        </div>

        <div class="screen hidden" id="trainingScreen">
            <!-- Экран конкретной тренировки (скрыт) -->
        </div>
    </div>

    <!-- Модальное окно для тренировки -->
    <div id="workoutModal" class="modal">
        <div class="modal-content">
            <div class="modal-title" id="workoutModalTitle">➕ Новая тренировка</div>
            <input type="text" id="workoutName" placeholder="Название тренировки">
            <div class="modal-buttons">
                <div class="modal-btn save" id="saveWorkoutBtn">Сохранить</div>
                <div class="modal-btn cancel" id="closeWorkoutModalBtn">Отмена</div>
            </div>
        </div>
    </div>

    <!-- Модальное окно для упражнения -->
    <div id="exerciseModal" class="modal">
        <div class="modal-content">
            <div class="modal-title" id="exerciseModalTitle">➕ Добавить упражнение</div>
            <input type="text" id="exerciseNameInput" placeholder="Название">
            <input type="text" id="exerciseSets" placeholder="Подходы (например: 4)">
            <input type="text" id="exerciseReps" placeholder="Повторения (например: 12)">
            <input type="text" id="exerciseWeight" placeholder="Вес (кг)">
            <div class="modal-buttons">
                <div class="modal-btn save" id="saveExerciseBtn">Сохранить</div>
                <div class="modal-btn cancel" id="closeExerciseModalBtn">Отмена</div>
            </div>
        </div>
    </div>

    <script>
        let workouts = [];
        let currentWorkoutId = null;
        let editingWorkoutId = null;
        let editingExerciseId = null;

        function loadWorkouts() {
            const saved = localStorage.getItem('ls_control_trainings');
            if (saved) {
                workouts = JSON.parse(saved);
            } else {
                workouts = [
                    { id: 1, name: "Тренировка А", exercises: [], lastDate: null, completed: 0 },
                    { id: 2, name: "Тренировка Б", exercises: [], lastDate: null, completed: 0 }
                ];
            }
            renderWorkoutsList();
        }

        function saveWorkouts() {
            localStorage.setItem('ls_control_trainings', JSON.stringify(workouts));
        }

        function renderWorkoutsList() {
            const container = document.getElementById('workoutsList');
            if (!container) return;
            container.innerHTML = '';
            if (workouts.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#6e6e7e; padding:20px;">Нет тренировок<br>Нажмите "➕ Новая"</div>';
                return;
            }
            workouts.forEach(workout => {
                const total = workout.exercises.length;
                const completed = workout.exercises.filter(ex => ex.checked).length;
                const percent = total > 0 ? (completed / total) * 100 : 0;
                const card = document.createElement('div');
                card.className = 'workout-card';
                card.innerHTML = `
                    <div class="workout-header">
                        <span class="workout-name">🏋️ ${escapeHtml(workout.name)}</span>
                        <div class="workout-actions">
                            <span class="workout-edit" data-id="${workout.id}">✏️</span>
                            <span class="workout-delete" data-id="${workout.id}">🗑️</span>
                        </div>
                    </div>
                    <div class="workout-stats">${workout.lastDate ? `🕐 Последний раз: ${workout.lastDate}` : '🕐 Нет данных'}</div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%;"></div></div>
                `;
                card.addEventListener('click', (e) => {
                    if (e.target.classList.contains('workout-edit') || e.target.classList.contains('workout-delete')) return;
                    openTrainingScreen(workout.id);
                });
                container.appendChild(card);
            });
            document.querySelectorAll('.workout-edit').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(el.dataset.id);
                    const workout = workouts.find(w => w.id === id);
                    if (workout) {
                        editingWorkoutId = id;
                        document.getElementById('workoutModalTitle').innerText = '✏️ Редактировать тренировку';
                        document.getElementById('workoutName').value = workout.name;
                        document.getElementById('workoutModal').style.display = 'flex';
                    }
                });
            });
            document.querySelectorAll('.workout-delete').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(el.dataset.id);
                    workouts = workouts.filter(w => w.id !== id);
                    saveWorkouts();
                    renderWorkoutsList();
                });
            });
        }

        function openTrainingScreen(workoutId) {
            currentWorkoutId = workoutId;
            const workout = workouts.find(w => w.id === workoutId);
            if (!workout) return;
            document.getElementById('mainScreen').classList.add('hidden');
            document.getElementById('trainingScreen').classList.remove('hidden');
            renderTrainingScreen();
        }

        function renderTrainingScreen() {
            const workout = workouts.find(w => w.id === currentWorkoutId);
            if (!workout) return;
            const total = workout.exercises.length;
            const completed = workout.exercises.filter(ex => ex.checked).length;
            const percent = total > 0 ? (completed / total) * 100 : 0;
            const container = document.getElementById('trainingScreen');
            container.innerHTML = `
                <div class="training-screen">
                    <div class="section-header">
                        <div class="header-left">
                            <div class="back-btn" id="backToMain">←</div>
                            <div class="training-name">${escapeHtml(workout.name)}</div>
                        </div>
                        <div class="workout-actions">
                            <span class="action-icon" id="editTrainingIcon">✏️</span>
                            <span class="action-icon" id="deleteTrainingIcon">🗑️</span>
                        </div>
                    </div>
                    <div class="training-stats">
                        <div class="training-last">🕐 ${workout.lastDate ? `Последний раз: ${workout.lastDate}` : 'Нет данных'}</div>
                        <div class="training-progress">🔥 Прогресс: ${completed}/${total} упражнений</div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%;"></div></div>
                    </div>
                    <div class="exercises-list" id="trainingExercisesList"></div>
                    <div class="add-exercise-btn" id="addExerciseToTraining">➕ Добавить упражнение</div>
                    <div class="complete-workout-btn" id="completeWorkoutBtn">✅ ЗАВЕРШИТЬ ТРЕНИРОВКУ</div>
                </div>
            `;
            renderExercisesList();
            document.getElementById('backToMain').addEventListener('click', () => {
                document.getElementById('mainScreen').classList.remove('hidden');
                document.getElementById('trainingScreen').classList.add('hidden');
                renderWorkoutsList();
            });
            document.getElementById('editTrainingIcon').addEventListener('click', () => {
                editingWorkoutId = currentWorkoutId;
                document.getElementById('workoutModalTitle').innerText = '✏️ Редактировать тренировку';
                document.getElementById('workoutName').value = workout.name;
                document.getElementById('workoutModal').style.display = 'flex';
            });
            document.getElementById('deleteTrainingIcon').addEventListener('click', () => {
                if (confirm('Удалить тренировку?')) {
                    workouts = workouts.filter(w => w.id !== currentWorkoutId);
                    saveWorkouts();
                    document.getElementById('mainScreen').classList.remove('hidden');
                    document.getElementById('trainingScreen').classList.add('hidden');
                    renderWorkoutsList();
                }
            });
            document.getElementById('addExerciseToTraining').addEventListener('click', () => {
                editingExerciseId = null;
                document.getElementById('exerciseModalTitle').innerText = '➕ Добавить упражнение';
                document.getElementById('exerciseNameInput').value = '';
                document.getElementById('exerciseSets').value = '';
                document.getElementById('exerciseReps').value = '';
                document.getElementById('exerciseWeight').value = '';
                document.getElementById('exerciseModal').style.display = 'flex';
            });
            document.getElementById('completeWorkoutBtn').addEventListener('click', () => {
                const now = new Date();
                workout.lastDate = now.toLocaleDateString('ru-RU');
                saveWorkouts();
                renderTrainingScreen();
                alert('Тренировка завершена! Отличная работа! 💪');
            });
        }

        function renderExercisesList() {
            const workout = workouts.find(w => w.id === currentWorkoutId);
            if (!workout) return;
            const container = document.getElementById('trainingExercisesList');
            if (!container) return;
            container.innerHTML = '';
            if (workout.exercises.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#6e6e7e; padding:20px;">Нет упражнений<br>Добавьте первое ➕</div>';
                return;
            }
            workout.exercises.forEach(ex => {
                const div = document.createElement('div');
                div.className = 'exercise-item';
                div.innerHTML = `
                    <div class="exercise-info">
                        <div class="exercise-name">${escapeHtml(ex.name)}</div>
                        <div class="exercise-details">${ex.sets}х${ex.reps} ${ex.weight} кг</div>
                    </div>
                    <div class="exercise-sets">
                        <div class="set-info">Подходы: ${ex.sets}</div>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <div class="exercise-check ${ex.checked ? 'checked' : ''}" data-id="${ex.id}"></div>
                            <div class="exercise-actions">
                                <span class="action-icon edit-exercise" data-id="${ex.id}">✏️</span>
                                <span class="action-icon delete-exercise" data-id="${ex.id}">🗑️</span>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
            document.querySelectorAll('.exercise-check').forEach(el => {
                el.addEventListener('click', (e) => {
                    const id = parseInt(el.dataset.id);
                    const exercise = workout.exercises.find(ex => ex.id === id);
                    if (exercise) {
                        exercise.checked = !exercise.checked;
                        saveWorkouts();
                        renderExercisesList();
                        renderTrainingScreen();
                    }
                    e.stopPropagation();
                });
            });
            document.querySelectorAll('.edit-exercise').forEach(el => {
                el.addEventListener('click', (e) => {
                    const id = parseInt(el.dataset.id);
                    const exercise = workout.exercises.find(ex => ex.id === id);
                    if (exercise) {
                        editingExerciseId = id;
                        document.getElementById('exerciseModalTitle').innerText = '✏️ Редактировать упражнение';
                        document.getElementById('exerciseNameInput').value = exercise.name;
                        document.getElementById('exerciseSets').value = exercise.sets;
                        document.getElementById('exerciseReps').value = exercise.reps;
                        document.getElementById('exerciseWeight').value = exercise.weight;
                        document.getElementById('exerciseModal').style.display = 'flex';
                    }
                    e.stopPropagation();
                });
            });
            document.querySelectorAll('.delete-exercise').forEach(el => {
                el.addEventListener('click', (e) => {
                    const id = parseInt(el.dataset.id);
                    workout.exercises = workout.exercises.filter(ex => ex.id !== id);
                    saveWorkouts();
                    renderExercisesList();
                    renderTrainingScreen();
                    e.stopPropagation();
                });
            });
        }

        document.getElementById('createWorkoutBtn').addEventListener('click', () => {
            editingWorkoutId = null;
            document.getElementById('workoutModalTitle').innerText = '➕ Новая тренировка';
            document.getElementById('workoutName').value = '';
            document.getElementById('workoutModal').style.display = 'flex';
        });

        document.getElementById('saveWorkoutBtn').addEventListener('click', () => {
            const name = document.getElementById('workoutName').value.trim();
            if (!name) return;
            if (editingWorkoutId) {
                const workout = workouts.find(w => w.id === editingWorkoutId);
                if (workout) workout.name = name;
            } else {
                workouts.push({ id: Date.now(), name, exercises: [], lastDate: null, completed: 0 });
            }
            saveWorkouts();
            renderWorkoutsList();
            document.getElementById('workoutModal').style.display = 'none';
        });

        document.getElementById('closeWorkoutModalBtn').addEventListener('click', () => {
            document.getElementById('workoutModal').style.display = 'none';
        });

        document.getElementById('saveExerciseBtn').addEventListener('click', () => {
            const name = document.getElementById('exerciseNameInput').value.trim();
            const sets = document.getElementById('exerciseSets').value.trim();
            const reps = document.getElementById('exerciseReps').value.trim();
            const weight = document.getElementById('exerciseWeight').value.trim();
            if (!name || !sets || !reps) return;
            const workout = workouts.find(w => w.id === currentWorkoutId);
            if (workout) {
                if (editingExerciseId) {
                    const ex = workout.exercises.find(ex => ex.id === editingExerciseId);
                    if (ex) {
                        ex.name = name;
                        ex.sets = sets;
                        ex.reps = reps;
                        ex.weight = weight;
                    }
                } else {
                    workout.exercises.push({ id: Date.now(), name, sets, reps, weight, checked: false });
                }
                saveWorkouts();
                renderExercisesList();
                renderTrainingScreen();
            }
            document.getElementById('exerciseModal').style.display = 'none';
        });

        document.getElementById('closeExerciseModalBtn').addEventListener('click', () => {
            document.getElementById('exerciseModal').style.display = 'none';
        });

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        loadWorkouts();
    </script>
</body>
</html>
