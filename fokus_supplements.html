<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LS Control — БАДы и спортпит</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px;
        }

        .phone {
            width: 375px;
            height: 700px;
            background: #111117;
            border-radius: 52px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 8px #1c1c24, 0 0 0 12px #2c2c34;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen {
            flex: 1;
            padding: 14px 18px 12px 18px;
            display: flex;
            flex-direction: column;
            background: #111117;
            height: 100%;
            overflow: hidden;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 215, 0, 0.08);
            border-radius: 30px;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: translateX(-3px);
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #FFD966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .add-btn {
            background: rgba(255, 215, 0, 0.1);
            border: 0.5px solid rgba(255, 215, 0, 0.3);
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 12px;
            color: #FFD966;
            cursor: pointer;
        }

        .scroll-content {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .scroll-content::-webkit-scrollbar {
            display: none;
        }

        .supplement-card {
            background: rgba(30, 30, 42, 0.5);
            border-radius: 20px;
            padding: 14px;
            border: 0.5px solid rgba(255, 215, 0, 0.15);
        }

        .sup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .sup-name {
            font-size: 16px;
            font-weight: 600;
            color: #FFD966;
        }

        .sup-actions {
            display: flex;
            gap: 10px;
        }

        .sup-edit, .sup-delete {
            font-size: 16px;
            cursor: pointer;
            opacity: 0.6;
        }

        .sup-dosage {
            font-size: 13px;
            color: #fff;
            margin-bottom: 8px;
        }

        .sup-schedule {
            font-size: 12px;
            color: #8e8e9e;
            margin-bottom: 12px;
        }

        .sup-reminder {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 8px;
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .reminder-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .reminder-time {
            font-size: 13px;
            color: #FFD966;
        }

        .toggle-switch {
            width: 40px;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            cursor: pointer;
            position: relative;
            transition: 0.2s;
        }

        .toggle-switch.active {
            background: rgba(255, 215, 0, 0.3);
        }

        .toggle-switch::after {
            content: "";
            width: 16px;
            height: 16px;
            background: #FFD966;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 3px;
            transition: 0.2s;
        }

        .toggle-switch.active::after {
            left: 21px;
        }

        .taken-btn {
            background: rgba(255, 215, 0, 0.1);
            border: 0.5px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 11px;
            color: #FFD966;
            cursor: pointer;
        }

        .taken-btn.completed {
            background: rgba(76, 175, 80, 0.2);
            border-color: #4CAF50;
            color: #4CAF50;
        }

        .empty-state {
            text-align: center;
            color: #6e6e7e;
            padding: 40px 20px;
        }

        .tab-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0 6px;
            background: rgba(18, 18, 24, 0.9);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(255,255,255,0.06);
            margin-top: 12px;
            border-radius: 32px;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            color: #6e6e7e;
            font-size: 9px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .tab-item.active {
            color: #ffd966;
            background: rgba(255, 217, 102, 0.1);
        }

        .tab-icon {
            font-size: 18px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1a1a24;
            border-radius: 28px;
            width: 300px;
            padding: 20px;
            border: 0.5px solid #FFD966;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: #FFD966;
            margin-bottom: 16px;
        }

        .modal input, .modal select {
            width: 100%;
            background: rgba(30, 30, 42, 0.8);
            border: 0.5px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            padding: 10px 14px;
            color: #fff;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .modal-btn {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 30px;
            cursor: pointer;
        }

        .modal-btn.save {
            background: rgba(255, 215, 0, 0.15);
            color: #FFD966;
        }

        .modal-btn.cancel {
            background: rgba(255, 255, 255, 0.1);
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="screen">
            <div class="section-header">
                <div class="header-left">
                    <div class="back-btn" onclick="location.href='fokus_body.html'">←</div>
                    <div class="section-title">БАДы и спортпит</div>
                </div>
                <div class="add-btn" id="addSupplementBtn">➕ Добавить</div>
            </div>

            <div class="scroll-content" id="supplementsList"></div>

            <div class="tab-bar">
                <div class="tab-item" onclick="location.href='fokus_progress.html'">
                    <span class="tab-icon">📈</span>
                    <span>Прогресс</span>
                </div>
                <div class="tab-item active">
                    <span class="tab-icon">💪</span>
                    <span>Тело</span>
                </div>
                <div class="tab-item" onclick="location.href='fokus_profile.html'">
                    <span class="tab-icon">👤</span>
                    <span>Профиль</span>
                </div>
            </div>
        </div>
    </div>

    <div id="supplementModal" class="modal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">➕ Добавить БАД</div>
            <input type="text" id="supName" placeholder="Название">
            <input type="text" id="supDosage" placeholder="Дозировка (например: 30 г)">
            <input type="text" id="supTime" placeholder="Время приёма (например: 08:00, 20:00)">
            <select id="supFrequency">
                <option value="daily">Ежедневно</option>
                <option value="weekly">По дням недели</option>
                <option value="interval">С интервалом</option>
            </select>
            <div class="modal-buttons">
                <div class="modal-btn save" id="saveSupplementBtn">Сохранить</div>
                <div class="modal-btn cancel" id="closeModalBtn">Отмена</div>
            </div>
        </div>
    </div>

    <script>
        let supplements = [];

        function loadData() {
            const saved = localStorage.getItem('ls_control_supplements');
            if (saved) {
                supplements = JSON.parse(saved);
            } else {
                supplements = [
                    { id: 1, name: "Протеин", dosage: "30 г", time: "08:00, 20:00", frequency: "daily", reminderEnabled: true, taken: false, lastTakenDate: null },
                    { id: 2, name: "Креатин", dosage: "5 г", time: "09:00", frequency: "daily", reminderEnabled: true, taken: false, lastTakenDate: null }
                ];
            }
            renderSupplements();
            checkReminders();
        }

        function saveData() {
            localStorage.setItem('ls_control_supplements', JSON.stringify(supplements));
            renderSupplements();
        }

        function renderSupplements() {
            const container = document.getElementById('supplementsList');
            if (!container) return;
            container.innerHTML = '';
            if (supplements.length === 0) {
                container.innerHTML = '<div class="empty-state">🥤 Нет добавленных БАДов<br>Нажмите "➕ Добавить"</div>';
                return;
            }
            supplements.forEach(sup => {
                const today = new Date().toLocaleDateString('ru-RU');
                const isTakenToday = sup.lastTakenDate === today && sup.taken;
                const card = document.createElement('div');
                card.className = 'supplement-card';
                card.innerHTML = `
                    <div class="sup-header">
                        <span class="sup-name">🥤 ${escapeHtml(sup.name)}</span>
                        <div class="sup-actions">
                            <span class="sup-edit" data-id="${sup.id}">✏️</span>
                            <span class="sup-delete" data-id="${sup.id}">🗑️</span>
                        </div>
                    </div>
                    <div class="sup-dosage">${escapeHtml(sup.dosage)}</div>
                    <div class="sup-schedule">⏰ ${escapeHtml(sup.time)} • ${sup.frequency === 'daily' ? 'Ежедневно' : sup.frequency === 'weekly' ? 'По дням недели' : 'С интервалом'}</div>
                    <div class="sup-reminder">
                        <div class="reminder-toggle">
                            <span class="reminder-time">🔔 Напоминание</span>
                            <div class="toggle-switch ${sup.reminderEnabled ? 'active' : ''}" data-id="${sup.id}"></div>
                        </div>
                        <div class="taken-btn ${isTakenToday ? 'completed' : ''}" data-id="${sup.id}">${isTakenToday ? '✅ Принято' : '🥤 Отметить'}</div>
                    </div>
                `;
                container.appendChild(card);
            });

            document.querySelectorAll('.sup-edit').forEach(el => {
                el.addEventListener('click', (e) => {
                    const id = parseInt(el.dataset.id);
                    const sup = supplements.find(s => s.id === id);
                    if (sup) {
                        document.getElementById('modalTitle').innerText = '✏️ Редактировать';
                        document.getElementById('supName').value = sup.name;
                        document.getElementById('supDosage').value = sup.dosage;
                        document.getElementById('supTime').value = sup.time;
                        document.getElementById('supFrequency').value = sup.frequency;
                        document.getElementById('supplementModal').dataset.editId = id;
                        document.getElementById('supplementModal').style.display = 'flex';
                    }
                    e.stopPropagation();
                });
            });

            document.querySelectorAll('.sup-delete').forEach(el => {
                el.addEventListener('click', (e) => {
                    const id = parseInt(el.dataset.id);
                    if (confirm('Удалить БАД?')) {
                        supplements = supplements.filter(s => s.id !== id);
                        saveData();
                    }
                    e.stopPropagation();
                });
            });

            document.querySelectorAll('.toggle-switch').forEach(el => {
                el.addEventListener('click', (e) => {
                    const id = parseInt(el.dataset.id);
                    const sup = supplements.find(s => s.id === id);
                    if (sup) {
                        sup.reminderEnabled = !sup.reminderEnabled;
                        saveData();
                        if (sup.reminderEnabled) {
                            requestNotificationPermission(sup);
                        }
                    }
                    e.stopPropagation();
                });
            });

            document.querySelectorAll('.taken-btn').forEach(el => {
                el.addEventListener('click', (e) => {
                    const id = parseInt(el.dataset.id);
                    const sup = supplements.find(s => s.id === id);
                    if (sup) {
                        const today = new Date().toLocaleDateString('ru-RU');
                        if (sup.lastTakenDate === today && sup.taken) {
                            alert('Вы уже отметили приём на сегодня!');
                        } else {
                            sup.taken = true;
                            sup.lastTakenDate = today;
                            saveData();
                            alert(`✅ ${sup.name} принято!`);
                        }
                    }
                    e.stopPropagation();
                });
            });
        }

        function requestNotificationPermission(sup) {
            if (Notification.permission === 'granted') {
                scheduleReminder(sup);
            } else if (Notification.permission !== 'denied') {
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') scheduleReminder(sup);
                });
            }
        }

        function scheduleReminder(sup) {
            const times = sup.time.split(',').map(t => t.trim());
            times.forEach(time => {
                const [hour, minute] = time.split(':').map(Number);
                const now = new Date();
                const reminderTime = new Date();
                reminderTime.setHours(hour, minute, 0, 0);
                if (reminderTime < now) reminderTime.setDate(reminderTime.getDate() + 1);
                const delay = reminderTime - now;
                setTimeout(() => {
                    new Notification(`🥤 Напоминание: ${sup.name}`, {
                        body: `Пора принять ${sup.dosage}`,
                        icon: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23FFD966"%3E%3Cpath d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm0 13c-2.33 0-4.31-1.46-5.11-3.5h10.22c-.8 2.04-2.78 3.5-5.11 3.5z"/%3E%3C/svg%3E'
                    });
                }, delay);
            });
        }

        function checkReminders() {
            supplements.forEach(sup => {
                if (sup.reminderEnabled && Notification.permission === 'granted') {
                    scheduleReminder(sup);
                }
            });
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        document.getElementById('addSupplementBtn').addEventListener('click', () => {
            document.getElementById('modalTitle').innerText = '➕ Добавить БАД';
            document.getElementById('supName').value = '';
            document.getElementById('supDosage').value = '';
            document.getElementById('supTime').value = '';
            document.getElementById('supFrequency').value = 'daily';
            delete document.getElementById('supplementModal').dataset.editId;
            document.getElementById('supplementModal').style.display = 'flex';
        });

        document.getElementById('saveSupplementBtn').addEventListener('click', () => {
            const name = document.getElementById('supName').value.trim();
            const dosage = document.getElementById('supDosage').value.trim();
            const time = document.getElementById('supTime').value.trim();
            const frequency = document.getElementById('supFrequency').value;
            if (!name || !dosage || !time) return;
            const editId = document.getElementById('supplementModal').dataset.editId;
            if (editId) {
                const sup = supplements.find(s => s.id === parseInt(editId));
                if (sup) {
                    sup.name = name;
                    sup.dosage = dosage;
                    sup.time = time;
                    sup.frequency = frequency;
                }
            } else {
                supplements.push({
                    id: Date.now(),
                    name: name,
                    dosage: dosage,
                    time: time,
                    frequency: frequency,
                    reminderEnabled: true,
                    taken: false,
                    lastTakenDate: null
                });
            }
            saveData();
            document.getElementById('supplementModal').style.display = 'none';
        });

        document.getElementById('closeModalBtn').addEventListener('click', () => {
            document.getElementById('supplementModal').style.display = 'none';
        });

        if (Notification.permission === 'default') {
            Notification.requestPermission();
        }

        loadData();
    </script>
</body>
</html>
