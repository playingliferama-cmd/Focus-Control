<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LS Control — Зарядка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px;
        }

        .phone {
            width: 375px;
            height: 700px;
            background: #111117;
            border-radius: 52px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 8px #1c1c24, 0 0 0 12px #2c2c34;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen {
            flex: 1;
            padding: 14px 18px 12px 18px;
            display: flex;
            flex-direction: column;
            background: #111117;
            height: 100%;
            overflow: hidden;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 215, 0, 0.08);
            border-radius: 30px;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: translateX(-3px);
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #FFD966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-right {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: rgba(255, 215, 0, 0.08);
            border: 0.5px solid rgba(255, 215, 0, 0.2);
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 12px;
            color: #FFD966;
            cursor: pointer;
            transition: 0.2s;
        }

        .greeting {
            margin-bottom: 12px;
        }

        .greeting-name {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
        }

        .greeting-date {
            font-size: 12px;
            color: #8e8e9e;
            margin-top: 2px;
        }

        .streak-card {
            background: rgba(30, 30, 42, 0.5);
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .streak-label {
            font-size: 13px;
            color: #aaa;
        }

        .streak-value {
            font-size: 22px;
            font-weight: 700;
            color: #FFD966;
        }

        .progress-card {
            background: rgba(30, 30, 42, 0.5);
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
            color: #aaa;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FFD966, #FFAA33);
            border-radius: 6px;
            width: 0%;
        }

        /* Список упражнений */
        .exercises-container {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
            margin-bottom: 12px;
        }

        .exercises-container::-webkit-scrollbar {
            display: none;
        }

        .exercise-item {
            background: rgba(30, 30, 42, 0.5);
            border-radius: 16px;
            padding: 10px 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .exercise-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .exercise-icon {
            font-size: 24px;
        }

        .exercise-details {
            flex: 1;
        }

        .exercise-name {
            font-size: 14px;
            font-weight: 500;
            color: #fff;
        }

        .exercise-reps {
            font-size: 11px;
            color: #8e8e9e;
        }

        .exercise-check {
            width: 28px;
            height: 28px;
            border-radius: 30px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
        }

        .exercise-check.checked {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd966;
        }

        .exercise-check.checked::after {
            content: "✓";
            color: #ffd966;
            font-size: 14px;
        }

        .exercise-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            font-size: 16px;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.2s;
            padding: 4px;
        }

        .action-btn:hover {
            opacity: 1;
        }

        /* Кнопки действий */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin: 12px 0;
        }

        .primary-btn {
            flex: 1;
            background: rgba(255, 215, 0, 0.1);
            border: 0.5px solid rgba(255, 215, 0, 0.3);
            border-radius: 30px;
            padding: 10px;
            text-align: center;
            font-size: 13px;
            color: #FFD966;
            cursor: pointer;
        }

        .secondary-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 10px;
            text-align: center;
            font-size: 13px;
            color: #aaa;
            cursor: pointer;
        }

        /* История дней */
        .history-section {
            background: rgba(30, 30, 42, 0.5);
            border-radius: 20px;
            padding: 12px;
            margin-top: 8px;
        }

        .history-title {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 10px;
        }

        .history-days {
            display: flex;
            justify-content: space-around;
            gap: 6px;
        }

        .day-item {
            flex: 1;
            text-align: center;
            font-size: 11px;
            color: #6e6e7e;
        }

        .day-status {
            font-size: 14px;
            margin-top: 4px;
        }

        .day-status.completed {
            color: #FFD966;
        }

        .day-status.skipped {
            color: #ff4444;
        }

        .day-status.empty {
            color: #333;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1a1a24;
            border-radius: 28px;
            width: 300px;
            padding: 20px;
            border: 0.5px solid #FFD966;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: #FFD966;
            margin-bottom: 16px;
        }

        .modal input {
            width: 100%;
            background: rgba(30, 30, 42, 0.8);
            border: 0.5px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            padding: 10px 14px;
            color: #fff;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .modal-btn {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 30px;
            cursor: pointer;
        }

        .modal-btn.save {
            background: rgba(255, 215, 0, 0.15);
            color: #FFD966;
        }

        .modal-btn.cancel {
            background: rgba(255, 255, 255, 0.1);
            color: #aaa;
        }

        .tab-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0 6px;
            background: rgba(18, 18, 24, 0.9);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(255,255,255,0.06);
            margin-top: 12px;
            border-radius: 32px;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            color: #6e6e7e;
            font-size: 9px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .tab-item.active {
            color: #ffd966;
            background: rgba(255, 217, 102, 0.1);
        }

        .tab-icon {
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="screen">
            <div class="section-header">
                <div class="header-left">
                    <div class="back-btn" onclick="location.href='fokus_body.html'">←</div>
                    <div class="section-title">Зарядка</div>
                </div>
                <div class="header-right">
                    <div class="icon-btn" id="reminderBtn">⏰ Напомнить</div>
                </div>
            </div>

            <div class="greeting">
                <div class="greeting-name" id="greetingName">Доброе утро, Александр!</div>
                <div class="greeting-date" id="todayDate"></div>
            </div>

            <div class="streak-card">
                <span class="streak-label">🔥 Стрик</span>
                <span class="streak-value" id="streakValue">0</span>
            </div>

            <div class="progress-card">
                <div class="progress-stats">
                    <span>📊 Прогресс</span>
                    <span id="progressText">0/0</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
                </div>
            </div>

            <div class="exercises-container" id="exercisesContainer"></div>

            <div class="action-buttons">
                <div class="primary-btn" id="addExerciseBtn">➕ Добавить упражнение</div>
                <div class="primary-btn" id="completeAllBtn">✅ Выполнил всё</div>
                <div class="secondary-btn" id="skipDayBtn">⏭️ Пропустить</div>
            </div>

            <div class="history-section">
                <div class="history-title">📅 История (последние 7 дней)</div>
                <div class="history-days" id="historyDays"></div>
            </div>

            <div class="tab-bar">
                <div class="tab-item" onclick="location.href='fokus_progress.html'">
                    <span class="tab-icon">📈</span>
                    <span>Прогресс</span>
                </div>
                <div class="tab-item active">
                    <span class="tab-icon">💪</span>
                    <span>Тело</span>
                </div>
                <div class="tab-item" onclick="location.href='fokus_profile.html'">
                    <span class="tab-icon">👤</span>
                    <span>Профиль</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно добавления/редактирования -->
    <div id="exerciseModal" class="modal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">➕ Добавить упражнение</div>
            <input type="text" id="exerciseName" placeholder="Название упражнения">
            <input type="text" id="exerciseReps" placeholder="Повторения (например: 15 раз, 30 сек)">
            <div class="modal-buttons">
                <div class="modal-btn save" id="saveExerciseBtn">Сохранить</div>
                <div class="modal-btn cancel" id="closeModalBtn">Отмена</div>
            </div>
        </div>
    </div>

    <script>
        // Базовые упражнения по умолчанию
        const defaultExercises = [
            { id: 1, name: "Разминка шеи", reps: "20 раз", icon: "🦒", checked: false },
            { id: 2, name: "Разминка плеч", reps: "20 раз", icon: "💪", checked: false },
            { id: 3, name: "Разминка поясницы", reps: "20 раз", icon: "🦴", checked: false },
            { id: 4, name: "Приседания", reps: "15 раз", icon: "🏋️", checked: false },
            { id: 5, name: "Отжимания", reps: "12 раз", icon: "💪", checked: false },
            { id: 6, name: "Планка", reps: "30 сек", icon: "🧘", checked: false },
            { id: 7, name: "Выпады", reps: "10 раз", icon: "🦵", checked: false },
            { id: 8, name: "Пресс", reps: "15 раз", icon: "🔥", checked: false }
        ];

        let exercises = [];
        let currentEditId = null;

        function getTodayKey() {
            return new Date().toISOString().slice(0,10);
        }

        function loadWorkoutData() {
            const saved = localStorage.getItem('ls_control_workout_exercises');
            if (saved) {
                exercises = JSON.parse(saved);
            } else {
                exercises = JSON.parse(JSON.stringify(defaultExercises));
            }
            
            const todayKey = getTodayKey();
            const savedChecks = localStorage.getItem('ls_control_workout_checks_' + todayKey);
            if (savedChecks) {
                const checks = JSON.parse(savedChecks);
                exercises.forEach(ex => {
                    if (checks[ex.id]) ex.checked = true;
                    else ex.checked = false;
                });
            } else {
                exercises.forEach(ex => ex.checked = false);
            }
            
            updateStreakAndHistory();
            renderExercises();
            updateProgress();
        }

        function saveExercises() {
            localStorage.setItem('ls_control_workout_exercises', JSON.stringify(exercises));
        }

        function saveTodayChecks() {
            const todayKey = getTodayKey();
            const checks = {};
            exercises.forEach(ex => { checks[ex.id] = ex.checked; });
            localStorage.setItem('ls_control_workout_checks_' + todayKey, JSON.stringify(checks));
            updateStreakAndHistory();
        }

        function updateStreakAndHistory() {
            let streak = 0;
            let history = [];
            for (let i = 0; i < 7; i++) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                const key = date.toISOString().slice(0,10);
                const saved = localStorage.getItem('ls_control_workout_checks_' + key);
                let status = 'empty';
                if (saved) {
                    const checks = JSON.parse(saved);
                    const values = Object.values(checks);
                    const anyChecked = values.some(v => v === true);
                    const allSkipped = values.length > 0 && values.every(v => v === false);
                    if (anyChecked) status = 'completed';
                    else if (allSkipped) status = 'skipped';
                }
                history.push({ date: key, status });
                if (i === 0 && status === 'completed') streak = 1;
                else if (i === 0 && status !== 'completed') streak = 0;
            }
            for (let i = 1; i < 7; i++) {
                if (history[i].status === 'completed') streak++;
                else break;
            }
            document.getElementById('streakValue').innerText = streak;
            renderHistory(history);
        }

        function renderHistory(history) {
            const container = document.getElementById('historyDays');
            container.innerHTML = '';
            const daysNames = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
            const todayIndex = new Date().getDay();
            for (let i = 6; i >= 0; i--) {
                const dayIndex = (todayIndex - i + 7) % 7;
                const dayName = daysNames[dayIndex];
                const historyItem = history[i] || { status: 'empty' };
                let statusIcon = '⚪';
                if (historyItem.status === 'completed') statusIcon = '🟢';
                if (historyItem.status === 'skipped') statusIcon = '🔴';
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day-item';
                dayDiv.innerHTML = `<div>${dayName}</div><div class="day-status">${statusIcon}</div>`;
                container.appendChild(dayDiv);
            }
        }

        function renderExercises() {
            const container = document.getElementById('exercisesContainer');
            container.innerHTML = '';
            exercises.forEach(ex => {
                const div = document.createElement('div');
                div.className = 'exercise-item';
                div.innerHTML = `
                    <div class="exercise-info">
                        <div class="exercise-icon">${ex.icon}</div>
                        <div class="exercise-details">
                            <div class="exercise-name">${escapeHtml(ex.name)}</div>
                            <div class="exercise-reps">${ex.reps}</div>
                        </div>
                    </div>
                    <div class="exercise-check ${ex.checked ? 'checked' : ''}" data-id="${ex.id}"></div>
                    <div class="exercise-actions">
                        <div class="action-btn edit-exercise" data-id="${ex.id}">✏️</div>
                        <div class="action-btn delete-exercise" data-id="${ex.id}">🗑️</div>
                    </div>
                `;
                container.appendChild(div);
            });
            
            document.querySelectorAll('.exercise-check').forEach(el => {
                el.addEventListener('click', (e) => {
                    const id = parseInt(el.dataset.id);
                    const exercise = exercises.find(ex => ex.id === id);
                    if (exercise) {
                        exercise.checked = !exercise.checked;
                        saveTodayChecks();
                        renderExercises();
                        updateProgress();
                    }
                    e.stopPropagation();
                });
            });
            
            document.querySelectorAll('.edit-exercise').forEach(el => {
                el.addEventListener('click', (e) => {
                    const id = parseInt(el.dataset.id);
                    const exercise = exercises.find(ex => ex.id === id);
                    if (exercise) {
                        currentEditId = id;
                        document.getElementById('modalTitle').innerText = '✏️ Редактировать';
                        document.getElementById('exerciseName').value = exercise.name;
                        document.getElementById('exerciseReps').value = exercise.reps;
                        document.getElementById('exerciseModal').style.display = 'flex';
                    }
                    e.stopPropagation();
                });
            });
            
            document.querySelectorAll('.delete-exercise').forEach(el => {
                el.addEventListener('click', (e) => {
                    const id = parseInt(el.dataset.id);
                    exercises = exercises.filter(ex => ex.id !== id);
                    saveExercises();
                    saveTodayChecks();
                    renderExercises();
                    updateProgress();
                    e.stopPropagation();
                });
            });
        }

        function updateProgress() {
            const total = exercises.length;
            const completed = exercises.filter(ex => ex.checked).length;
            document.getElementById('progressText').innerText = `${completed}/${total}`;
            const percent = total > 0 ? (completed / total) * 100 : 0;
            document.getElementById('progressFill').style.width = percent + '%';
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        document.getElementById('addExerciseBtn').addEventListener('click', () => {
            currentEditId = null;
            document.getElementById('modalTitle').innerText = '➕ Добавить упражнение';
            document.getElementById('exerciseName').value = '';
            document.getElementById('exerciseReps').value = '';
            document.getElementById('exerciseModal').style.display = 'flex';
        });

        document.getElementById('saveExerciseBtn').addEventListener('click', () => {
            const name = document.getElementById('exerciseName').value.trim();
            const reps = document.getElementById('exerciseReps').value.trim();
            if (!name || !reps) return;
            if (currentEditId) {
                const ex = exercises.find(ex => ex.id === currentEditId);
                if (ex) {
                    ex.name = name;
                    ex.reps = reps;
                }
            } else {
                const newId = Date.now();
                exercises.push({ id: newId, name, reps, icon: "🤸", checked: false });
            }
            saveExercises();
            renderExercises();
            updateProgress();
            document.getElementById('exerciseModal').style.display = 'none';
        });

        document.getElementById('completeAllBtn').addEventListener('click', () => {
            exercises.forEach(ex => ex.checked = true);
            saveTodayChecks();
            renderExercises();
            updateProgress();
        });

        document.getElementById('skipDayBtn').addEventListener('click', () => {
            if (confirm('Точно пропустить зарядку сегодня? Стрик сбросится.')) {
                exercises.forEach(ex => ex.checked = false);
                saveTodayChecks();
                renderExercises();
                updateProgress();
                updateStreakAndHistory();
            }
        });

        document.getElementById('reminderBtn').addEventListener('click', () => {
            const time = prompt('Установить время зарядки (например, 08:00):', '08:00');
            if (time) {
                alert(`Напоминание установлено на ${time}. Скоро добавим реальные push-уведомления!`);
            }
        });

        document.getElementById('closeModalBtn').addEventListener('click', () => {
            document.getElementById('exerciseModal').style.display = 'none';
        });

        function setGreeting() {
            const savedProfile = localStorage.getItem('fokus_profile');
            let name = 'Александр';
            if (savedProfile) {
                try {
                    const profile = JSON.parse(savedProfile);
                    if (profile.name) name = profile.name;
                } catch(e) {}
            }
            document.getElementById('greetingName').innerHTML = `Доброе утро, ${name}!`;
            const today = new Date();
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('todayDate').innerHTML = today.toLocaleDateString('ru-RU', options);
        }

        setGreeting();
        loadWorkoutData();
    </script>
</body>
</html>
